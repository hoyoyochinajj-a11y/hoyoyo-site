<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOYOYO 客服后台</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Microsoft YaHei", "Inter", sans-serif; background: #0f0f23; color: #e0e0e0; }
  .login-overlay { position: fixed; top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7); backdrop-filter:blur(8px); display:flex;align-items:center;justify-content:center;z-index:100; }
  .login-box { background: rgba(30,30,60,0.9); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.1); padding: 36px; border-radius: 20px; text-align: center; }
  .login-box h3 { color: white; font-size: 20px; margin-bottom: 20px; }
  .login-box input { padding: 12px 16px; width: 260px; margin: 8px 0; border:1px solid rgba(255,255,255,0.15); border-radius:10px; background:rgba(255,255,255,0.08); color:white; font-size:14px; outline:none; }
  .login-box input::placeholder { color: rgba(255,255,255,0.4); }
  .login-box input:focus { border-color: #6366f1; }
  .login-box button { padding: 12px 32px; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; border: none; border-radius: 10px; cursor: pointer; margin-top: 12px; font-size: 15px; font-weight: 500; transition: transform 0.2s; }
  .login-box button:hover { transform: scale(1.03); }
  .container { display: flex; height: 100vh; }
  .sidebar { width: 220px; background: #161630; color: white; padding: 0; border-right: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; }
  .sidebar h2 { padding: 24px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 18px; background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .sidebar div { padding: 13px 20px; cursor: pointer; transition: all 0.2s; font-size: 14px; color: rgba(255,255,255,0.65); }
  .sidebar div:hover { background: rgba(99,102,241,0.15); color: white; }
  .sidebar div.active { background: rgba(99,102,241,0.2); color: #818cf8; border-right: 3px solid #6366f1; }
  .main { flex: 1; padding: 24px; overflow-y: auto; background: #0f0f23; }
  .chat-message { margin: 8px 0; padding: 12px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; color: #e0e0e0; }
  .notification { position: fixed; top: 16px; right: 16px; background: linear-gradient(135deg, #ef4444, #dc2626); color: white; padding: 12px 24px; border-radius: 10px; display: none; z-index: 200; font-size: 14px; box-shadow: 0 8px 24px rgba(239,68,68,0.3); }
  .user-item { padding:12px 16px; cursor:pointer; border-radius:10px; margin-bottom:6px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.05); transition: all 0.2s; }
  .user-item:hover { background:rgba(99,102,241,0.1); border-color:rgba(99,102,241,0.2); }
  .user-item.active { background:rgba(99,102,241,0.15); border-color:rgba(99,102,241,0.3); }
  .note-area, .reply-area { display:flex; gap:8px; padding:12px; border-top:1px solid rgba(255,255,255,0.08); }
  .note-area input, .reply-area input { flex:1; padding:10px 14px; border:1px solid rgba(255,255,255,0.12); border-radius:8px; background:rgba(255,255,255,0.06); color:white; font-size:13px; outline:none; }
  .note-area input::placeholder, .reply-area input::placeholder { color:rgba(255,255,255,0.35); }
  .note-area input:focus, .reply-area input:focus { border-color:#6366f1; }
  .note-area button, .reply-area button { padding:8px 16px; border:none; border-radius:8px; cursor:pointer; font-size:13px; font-weight:500; transition: transform 0.2s; }
  .note-area button { background:linear-gradient(135deg,#10b981,#059669); color:white; }
  .reply-area button { background:linear-gradient(135deg,#f97316,#ea580c); color:white; }
  .note-area button:hover, .reply-area button:hover { transform: scale(1.03); }
  .form-group { margin-bottom:12px; }
  .form-group input, .form-group textarea, .form-group select { width:100%; padding:10px 14px; margin:4px 0; border:1px solid rgba(255,255,255,0.12); border-radius:8px; background:rgba(255,255,255,0.06); color:white; font-size:13px; outline:none; }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color:#6366f1; }
  .form-group select option { background: #1a1a3e; color: white; }
  .btn { background:linear-gradient(135deg,#6366f1,#8b5cf6); color:white; border:none; padding:8px 16px; border-radius:8px; cursor:pointer; margin-right:6px; font-size:13px; font-weight:500; transition: transform 0.2s; }
  .btn:hover { transform: scale(1.03); }
  .btn.danger { background:linear-gradient(135deg,#ef4444,#dc2626); }
  .btn.success { background:linear-gradient(135deg,#10b981,#059669); }
  
  /* 管理员账号管理样式 */
  .admin-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); padding: 16px; border-radius: 12px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
  .admin-info { flex: 1; }
  .admin-info h4 { margin-bottom: 6px; color: #e0e0e0; }
  .admin-info small { color: rgba(255,255,255,0.5); }
  .permission-tag { display: inline-block; padding: 3px 10px; background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.2); border-radius: 6px; margin: 2px; font-size: 12px; color: #818cf8; }
  .permission-tag.all { background: rgba(249,115,22,0.15); border-color: rgba(249,115,22,0.2); color: #fb923c; }
  .modal { position: fixed; top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6); backdrop-filter:blur(6px); display:flex;align-items:center;justify-content:center;z-index:300; }
  .modal-content { background: #1a1a3e; border: 1px solid rgba(255,255,255,0.1); padding: 28px; border-radius: 16px; width: 420px; color: #e0e0e0; }
  .modal-content h3 { margin-bottom: 18px; color: white; }
  .checkbox-group { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
  .checkbox-group label { display: flex; align-items: center; gap: 5px; padding: 6px 10px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; cursor: pointer; font-size: 13px; color: rgba(255,255,255,0.7); transition: all 0.2s; }
  .checkbox-group label:hover { background: rgba(99,102,241,0.15); border-color: rgba(99,102,241,0.2); }
  .checkbox-group label input { margin-right: 4px; accent-color: #6366f1; }
  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
</style>
</head>
<body>
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h3>🔐 管理员登录</h3>
    <input type="text" id="usernameInput" placeholder="请输入账号" />
    <input type="password" id="passwordInput" placeholder="请输入密码" />
    <button onclick="login()">进入后台</button>
  </div>
</div>
<div class="notification" id="notification"></div>

<div class="container">
  <div class="sidebar" id="sidebar">
    <h2>📊 HOYOYO 5.0</h2>
    <div onclick="switchPanel('ai-chats')" class="active">AI 对话记录</div>
    <div onclick="switchPanel('suggests')">建议列表</div>
    <div onclick="switchPanel('demands')">需求列表</div>
    <div onclick="switchPanel('human')">👥 人工客服</div>
    <div onclick="switchPanel('emails')">📧 用户邮箱</div>
    <div onclick="switchPanel('knowledge')">📚 知识库</div>
    <div onclick="switchPanel('rules')">📋 规则管理</div>
    <div onclick="switchPanel('unanswered')">🤔 疑难记录</div>
    <div onclick="switchPanel('learn')">🌐 学习URL</div>
    <div onclick="switchPanel('admins')">👤 管理员账号</div>
  </div>
  <div class="main" id="mainContent"></div>
</div>

<script>
  let currentPanel = 'ai-chats';
  let selectedUserId = null;
  let humanRefresh = null;
  let panelRefresh = null;
  let currentAdmin = null; // 当前登录的管理员信息

  async function login() {
    const username = document.getElementById('usernameInput').value.trim();
    const pwd = document.getElementById('passwordInput').value;
    
    if (!username) {
      alert('请输入账号');
      return;
    }
    
    const res = await fetch('/api/login', { 
      method:'POST', 
      headers:{'Content-Type':'application/json'}, 
      body:JSON.stringify({ username, password: pwd }) 
    });
    
    if (res.ok) {
      const data = await res.json();
      currentAdmin = data.admin;
      document.getElementById('loginOverlay').style.display = 'none';
      
      // 根据权限显示/隐藏菜单
      applyPermissions();
      startRefresh();
    } else {
      const err = await res.json();
      alert(err.error || '登录失败');
    }
  }

  function applyPermissions() {
    if (!currentAdmin) return;
    const permissions = currentAdmin.permissions || [];
    const isSuperAdmin = currentAdmin.role === 'superadmin' || permissions.includes('all');
    
    const menuItems = document.querySelectorAll('.sidebar div');
    const panels = ['ai-chats', 'suggests', 'demands', 'human', 'emails', 'knowledge', 'rules', 'unanswered', 'learn', 'admins'];
    
    menuItems.forEach((item, idx) => {
      const panelName = panels[idx];
      if (panelName === 'admins') {
        // 只有超级管理员才能看到管理员账号管理
        item.style.display = isSuperAdmin ? 'block' : 'none';
      } else if (!isSuperAdmin) {
        // 非超级管理员根据权限显示
        item.style.display = permissions.includes(panelName) ? 'block' : 'none';
      } else {
        item.style.display = 'block';
      }
    });
  }

  function switchPanel(name) {
    currentPanel = name;
    if (humanRefresh) { clearInterval(humanRefresh); humanRefresh = null; }
    if (panelRefresh) { clearInterval(panelRefresh); panelRefresh = null; }
    document.querySelectorAll('.sidebar div').forEach(d => d.classList.remove('active'));
    const idx = ['ai-chats','suggests','demands','human','emails','knowledge','rules','unanswered','learn','admins'].indexOf(name);
    if (idx >= 0) document.querySelectorAll('.sidebar div')[idx].classList.add('active');
    loadPanel(name);
  }

  async function fetchJSON(url, options) {
    const res = await fetch(url, options);
    if (!res.ok) throw new Error('请求失败');
    return res.json();
  }

  async function loadPanel(name) {
    const main = document.getElementById('mainContent');
    main.innerHTML = '加载中...';
    try {
      if (name === 'ai-chats') {
        main.innerHTML = '<h3>AI 对话记录</h3><div id="list"></div>';
        const data = await fetchJSON('/api/ai-chats');
        document.getElementById('list').innerHTML = data.map(c => `<div class="chat-message"><b>${c.email}</b> <small>${new Date(c.time).toLocaleString()}</small><br><b>问：</b>${c.message}<br><b>答：</b>${c.reply}</div>`).join('');
      }
      else if (name === 'suggests') {
        main.innerHTML = '<h3>建议列表</h3><div id="list"></div>';
        const data = await fetchJSON('/api/suggests');
        document.getElementById('list').innerHTML = data.map(s => `<div class="chat-message"><b>${s.email}</b> <small>${new Date(s.time).toLocaleString()}</small><br>${s.content}</div>`).join('');
      }
      else if (name === 'demands') {
        main.innerHTML = '<h3>需求列表</h3><div id="list"></div>';
        const data = await fetchJSON('/api/demands');
        document.getElementById('list').innerHTML = data.map(d => `<div class="chat-message"><b>${d.email}</b> <small>${new Date(d.time).toLocaleString()}</small><br>${d.content}</div>`).join('');
      }
      else if (name === 'human') {
        main.innerHTML = `<div style="display:flex; height:calc(100vh - 80px);">
          <div style="width:250px; border-right:1px solid #eee; overflow-y:auto; padding:10px;" id="userList"></div>
          <div style="flex:1; display:flex; flex-direction:column;">
            <div style="font-weight:bold; padding:10px; background:#eee;" id="chatTitle">请选择用户</div>
            <div style="flex:1; overflow-y:auto; padding:10px; background:#fff;" id="humanChatBox"></div>
            <div class="note-area"><input type="text" id="noteInput" placeholder="添加备注..."><button onclick="saveNote()">保存备注</button></div>
            <div class="reply-area"><input type="text" id="humanReplyInput" placeholder="输入回复..." onkeypress="if(event.keyCode==13) sendReply()"><button onclick="sendReply()">发送</button></div>
          </div>
        </div>`;
        if (humanRefresh) clearInterval(humanRefresh);
        humanRefresh = setInterval(() => { if (currentPanel === 'human') refreshHumanData(); }, 3000);
        await refreshHumanData();
      }
      else if (name === 'emails') {
        main.innerHTML = '<h3>用户邮箱</h3><div id="list"></div>';
        const data = await fetchJSON('/api/user-email-list');
        document.getElementById('list').innerHTML = data.map(e => `<div class="chat-message">📧 ${e.email} - ${new Date(e.time).toLocaleString()}</div>`).join('');
      }
      else if (name === 'knowledge') {
        if (!document.getElementById('kbList')) {
          main.innerHTML = `<h3>知识库</h3>
            <div class="form-group"><input id="kbQ" placeholder="问题"><textarea id="kbA" placeholder="答案" rows="3"></textarea><input id="kbKw" placeholder="关键词(逗号分隔)"><button class="btn" onclick="addKB()">添加</button></div>
            <div id="kbList"></div>`;
        }
        if (panelRefresh) clearInterval(panelRefresh);
        panelRefresh = setInterval(() => { if (currentPanel === 'knowledge') refreshKBListOnly(); }, 5000);
        await refreshKBListOnly();
      }
      else if (name === 'rules') {
        if (!document.getElementById('ruleList')) {
          main.innerHTML = `<h3>规则管理</h3>
            <div class="form-group"><textarea id="ruleContent" placeholder="规则内容" rows="3"></textarea><button class="btn" onclick="addRule()">添加规则</button></div>
            <div id="ruleList"></div>`;
        }
        if (panelRefresh) clearInterval(panelRefresh);
        panelRefresh = setInterval(() => { if (currentPanel === 'rules') refreshRuleListOnly(); }, 5000);
        await refreshRuleListOnly();
      }
      else if (name === 'unanswered') {
        if (!document.getElementById('unansweredList')) {
          main.innerHTML = `<h3>🤔 疑难记录</h3><div id="unansweredList"></div>`;
        }
        if (panelRefresh) clearInterval(panelRefresh);
        panelRefresh = setInterval(() => { if (currentPanel === 'unanswered') refreshUnansweredOnly(); }, 5000);
        await refreshUnansweredOnly();
      }
      else if (name === 'learn') {
        if (!document.getElementById('learnList')) {
          main.innerHTML = `<h3>🌐 学习URL</h3>
            <div class="form-group"><input type="text" id="learnUrl" placeholder="输入网页URL，AI将抓取并学习内容"><button class="btn" onclick="submitLearn()">提交</button></div>
            <div id="learnList"></div>`;
        }
        if (panelRefresh) clearInterval(panelRefresh);
        panelRefresh = setInterval(() => { if (currentPanel === 'learn') refreshLearnOnly(); }, 5000);
        await refreshLearnOnly();
      }
      else if (name === 'admins') {
        main.innerHTML = `<h3>👤 管理员账号管理</h3>
          <p style="margin:10px 0;color:#666;">创建子账号并分配权限，不同管理员只能访问被授权的功能模块。</p>
          <button class="btn success" onclick="showAddAdminModal()" style="margin-bottom:15px;">+ 添加管理员</button>
          <div id="adminList"></div>`;
        await refreshAdminList();
      }
    } catch(e) { main.innerHTML = '<p style="color:red">加载失败</p>'; }
  }

  // ────── 人工客服局部刷新 ──────
  async function refreshHumanData() { await loadUsers(); if (selectedUserId) await loadChat(); }
  async function loadUsers() {
    const div = document.getElementById('userList');
    if (!div) return;
    const users = await fetchJSON('/api/human-user-list');
    div.innerHTML = users.map(u => `<div class="user-item ${u.userId===selectedUserId?'active':''}" onclick="selectUser('${u.userId}')"><strong>${u.email||atob(u.userId)}</strong><br><small>未读:${u.unread}</small></div>`).join('');
  }
  async function selectUser(uid) {
    selectedUserId = uid;
    const users = await fetchJSON('/api/human-user-list');
    const user = users.find(u => u.userId === uid);
    document.getElementById('chatTitle').innerText = `与 ${user?.email || atob(uid)} 对话中`;
    await loadChat();
    await loadNote();
  }
  async function loadChat() {
    const box = document.getElementById('humanChatBox');
    if (!box || !selectedUserId) return;
    const data = await fetchJSON(`/api/human-history?userId=${selectedUserId}`);
    box.innerHTML = data.messages.map(m => `<div style="text-align:${m.sender==='agent'?'left':'right'}; margin:4px;"><div style="display:inline-block;max-width:75%;padding:8px 12px;border-radius:12px;background:${m.sender==='agent'?'#f0f0f0':'#FF7A45'};">${m.content}<br><small>${new Date(m.time).toLocaleTimeString()}</small></div></div>`).join('');
    box.scrollTop = box.scrollHeight;
  }
  async function sendReply() {
    if (!selectedUserId) return alert('请先选择用户');
    const input = document.getElementById('humanReplyInput');
    if (!input) return;
    const msg = input.value.trim();
    if (!msg) return;
    await fetchJSON('/api/human-reply', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ userId: selectedUserId, message: msg }) });
    input.value = '';
    await loadChat();
  }
  async function loadNote() {
    const input = document.getElementById('noteInput');
    if (!input || !selectedUserId) return;
    try { const data = await fetchJSON(`/api/human-note?userId=${selectedUserId}`); input.value = data.note || ''; } catch(e) {}
  }
  async function saveNote() {
    if (!selectedUserId) return;
    const input = document.getElementById('noteInput');
    await fetchJSON('/api/human-note', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ userId: selectedUserId, note: input.value.trim() }) });
    alert('已保存');
  }

  // ────── 知识库 ──────
  async function addKB() {
    const q = document.getElementById('kbQ').value.trim();
    const a = document.getElementById('kbA').value.trim();
    const kw = document.getElementById('kbKw').value.split(',').map(k=>k.trim()).filter(Boolean);
    if (!q || !a) return alert('问题和答案不能为空');
    await fetchJSON('/api/kb/add', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ question: q, answer: a, keywords: kw }) });
    document.getElementById('kbQ').value = '';
    document.getElementById('kbA').value = '';
    document.getElementById('kbKw').value = '';
    await refreshKBListOnly();
  }
  async function refreshKBListOnly() {
    const list = await fetchJSON('/api/kb/list');
    const div = document.getElementById('kbList');
    if (div) {
      div.innerHTML = list.map(item => `<div class="chat-message"><b>Q:</b> ${item.question}<br><b>A:</b> ${item.answer}<button class="btn danger" onclick="deleteKB('${item.id}')" style="float:right">删除</button></div>`).join('');
    }
  }
  async function deleteKB(id) { await fetch(`/api/kb/delete/${id}`, { method:'DELETE' }); await refreshKBListOnly(); }

  // ────── 规则管理 ──────
  async function addRule() {
    const content = document.getElementById('ruleContent').value.trim();
    if (!content) return alert('请输入规则内容');
    await fetchJSON('/api/rules/add', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ content }) });
    document.getElementById('ruleContent').value = '';
    await refreshRuleListOnly();
  }
  async function refreshRuleListOnly() {
    const rules = await fetchJSON('/api/rules');
    const div = document.getElementById('ruleList');
    if (div) {
      div.innerHTML = rules.map(r => `<div class="chat-message"><p>${r.content}</p><button class="btn danger" onclick="deleteRule('${r.id}')">删除</button></div>`).join('');
    }
  }
  async function deleteRule(id) { await fetch(`/api/rules/${id}`, { method:'DELETE' }); await refreshRuleListOnly(); }

  // ────── 疑难记录 ──────
  async function refreshUnansweredOnly() {
    const list = await fetchJSON('/api/unanswered');
    const div = document.getElementById('unansweredList');
    if (div) {
      div.innerHTML = list.map(item => `<div class="chat-message"><b>${item.email}</b> <small>${new Date(item.time).toLocaleString()}</small><br>${item.question}<button class="btn danger" onclick="deleteUnanswered('${item.id}')" style="float:right">删除</button></div>`).join('');
    }
  }
  async function deleteUnanswered(id) { await fetch(`/api/unanswered/${id}`, { method:'DELETE' }); await refreshUnansweredOnly(); }

  // ────── 学习URL ──────
  async function submitLearn() {
    const url = document.getElementById('learnUrl').value.trim();
    if (!url) return alert('请输入URL');
    await fetchJSON('/api/kb/learn-url', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ url }) });
    document.getElementById('learnUrl').value = '';
    await refreshLearnOnly();
  }
  async function refreshLearnOnly() {
    const list = await fetchJSON('/api/kb/learned-list');
    const div = document.getElementById('learnList');
    if (div) {
      div.innerHTML = list.map(p => `<div class="chat-message"><b>${p.title}</b><br><small>${p.url}</small><br>${p.content.substring(0,100)}...<button class="btn danger" onclick="deleteLearned('${p.id}')" style="float:right">删除</button></div>`).join('');
    }
  }
  async function deleteLearned(id) { await fetch(`/api/kb/learned/${id}`, { method:'DELETE' }); await refreshLearnOnly(); }

  // ────── 管理员账号管理 ──────
  async function refreshAdminList() {
    const list = await fetchJSON('/api/admin/accounts');
    const div = document.getElementById('adminList');
    if (!div) return;
    
    const allPanels = [
      { id: 'ai-chats', name: 'AI对话' },
      { id: 'suggests', name: '建议列表' },
      { id: 'demands', name: '需求列表' },
      { id: 'human', name: '人工客服' },
      { id: 'emails', name: '用户邮箱' },
      { id: 'knowledge', name: '知识库' },
      { id: 'rules', name: '规则管理' },
      { id: 'unanswered', name: '疑难记录' },
      { id: 'learn', name: '学习URL' }
    ];
    
    div.innerHTML = list.map(admin => {
      const isSuper = admin.role === 'superadmin' || admin.permissions?.includes('all');
      const permTags = isSuper 
        ? '<span class="permission-tag all">全部权限</span>'
        : (admin.permissions || []).map(p => {
            const panel = allPanels.find(x => x.id === p);
            return panel ? `<span class="permission-tag">${panel.name}</span>` : '';
          }).join('');
      
      return `<div class="admin-card">
        <div class="admin-info">
          <h4>${admin.username} ${isSuper ? '<small style="color:#fa8c16;">(超级管理员)</small>' : ''}</h4>
          <small>创建时间: ${new Date(admin.createdAt).toLocaleString()}</small><br>
          <div style="margin-top:5px;">${permTags}</div>
        </div>
        <div>
          ${admin.id !== 'default' ? `<button class="btn" onclick="showEditAdminModal('${admin.id}')">编辑</button><button class="btn danger" onclick="deleteAdmin('${admin.id}')">删除</button>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  function showAddAdminModal() {
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.id = 'adminModal';
    modal.innerHTML = `<div class="modal-content">
      <h3>添加管理员</h3>
      <div class="form-group">
        <label>账号</label>
        <input type="text" id="newAdminUsername" placeholder="请输入账号">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="newAdminPassword" placeholder="请输入密码">
      </div>
      <div class="form-group">
        <label>角色</label>
        <select id="newAdminRole">
          <option value="admin">普通管理员</option>
          <option value="superadmin">超级管理员</option>
        </select>
      </div>
      <div class="form-group">
        <label>权限（普通管理员时生效）</label>
        <div class="checkbox-group" id="permissionCheckboxes">
          <label><input type="checkbox" value="ai-chats"> AI对话</label>
          <label><input type="checkbox" value="suggests"> 建议列表</label>
          <label><input type="checkbox" value="demands"> 需求列表</label>
          <label><input type="checkbox" value="human"> 人工客服</label>
          <label><input type="checkbox" value="emails"> 用户邮箱</label>
          <label><input type="checkbox" value="knowledge"> 知识库</label>
          <label><input type="checkbox" value="rules"> 规则管理</label>
          <label><input type="checkbox" value="unanswered"> 疑难记录</label>
          <label><input type="checkbox" value="learn"> 学习URL</label>
        </div>
      </div>
      <div style="text-align:right;margin-top:15px;">
        <button class="btn" onclick="closeAdminModal()">取消</button>
        <button class="btn success" onclick="createAdmin()">创建</button>
      </div>
    </div>`;
    document.body.appendChild(modal);
  }

  async function showEditAdminModal(id) {
    const list = await fetchJSON('/api/admin/accounts');
    const admin = list.find(a => a.id === id);
    if (!admin) return alert('账号不存在');
    
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.id = 'adminModal';
    modal.innerHTML = `<div class="modal-content">
      <h3>编辑管理员</h3>
      <div class="form-group">
        <label>账号</label>
        <input type="text" id="editAdminUsername" value="${admin.username}">
      </div>
      <div class="form-group">
        <label>新密码（留空则不修改）</label>
        <input type="password" id="editAdminPassword" placeholder="留空则不修改">
      </div>
      <div class="form-group">
        <label>角色</label>
        <select id="editAdminRole">
          <option value="admin" ${admin.role !== 'superadmin' ? 'selected' : ''}>普通管理员</option>
          <option value="superadmin" ${admin.role === 'superadmin' ? 'selected' : ''}>超级管理员</option>
        </select>
      </div>
      <div class="form-group">
        <label>权限（普通管理员时生效）</label>
        <div class="checkbox-group" id="permissionCheckboxes">
          <label><input type="checkbox" value="ai-chats" ${admin.permissions?.includes('ai-chats') || admin.permissions?.includes('all') ? 'checked' : ''}> AI对话</label>
          <label><input type="checkbox" value="suggests" ${admin.permissions?.includes('suggests') || admin.permissions?.includes('all') ? 'checked' : ''}> 建议列表</label>
          <label><input type="checkbox" value="demands" ${admin.permissions?.includes('demands') || admin.permissions?.includes('all') ? 'checked' : ''}> 需求列表</label>
          <label><input type="checkbox" value="human" ${admin.permissions?.includes('human') || admin.permissions?.includes('all') ? 'checked' : ''}> 人工客服</label>
          <label><input type="checkbox" value="emails" ${admin.permissions?.includes('emails') || admin.permissions?.includes('all') ? 'checked' : ''}> 用户邮箱</label>
          <label><input type="checkbox" value="knowledge" ${admin.permissions?.includes('knowledge') || admin.permissions?.includes('all') ? 'checked' : ''}> 知识库</label>
          <label><input type="checkbox" value="rules" ${admin.permissions?.includes('rules') || admin.permissions?.includes('all') ? 'checked' : ''}> 规则管理</label>
          <label><input type="checkbox" value="unanswered" ${admin.permissions?.includes('unanswered') || admin.permissions?.includes('all') ? 'checked' : ''}> 疑难记录</label>
          <label><input type="checkbox" value="learn" ${admin.permissions?.includes('learn') || admin.permissions?.includes('all') ? 'checked' : ''}> 学习URL</label>
        </div>
      </div>
      <div style="text-align:right;margin-top:15px;">
        <button class="btn" onclick="closeAdminModal()">取消</button>
        <button class="btn success" onclick="updateAdmin('${id}')">保存</button>
      </div>
    </div>`;
    document.body.appendChild(modal);
  }

  function closeAdminModal() {
    const modal = document.getElementById('adminModal');
    if (modal) modal.remove();
  }

  async function createAdmin() {
    const username = document.getElementById('newAdminUsername').value.trim();
    const password = document.getElementById('newAdminPassword').value;
    const role = document.getElementById('newAdminRole').value;
    const checkboxes = document.querySelectorAll('#permissionCheckboxes input:checked');
    const permissions = Array.from(checkboxes).map(cb => cb.value);
    
    if (!username || !password) return alert('账号和密码不能为空');
    
    try {
      await fetchJSON('/api/admin/accounts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password, role, permissions })
      });
      closeAdminModal();
      await refreshAdminList();
      alert('创建成功');
    } catch(e) {
      alert('创建失败: ' + e.message);
    }
  }

  async function updateAdmin(id) {
    const username = document.getElementById('editAdminUsername').value.trim();
    const password = document.getElementById('editAdminPassword').value;
    const role = document.getElementById('editAdminRole').value;
    const checkboxes = document.querySelectorAll('#permissionCheckboxes input:checked');
    const permissions = Array.from(checkboxes).map(cb => cb.value);
    
    if (!username) return alert('账号不能为空');
    
    const updateData = { username, role, permissions };
    if (password) updateData.password = password;
    
    try {
      await fetchJSON(`/api/admin/accounts/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(updateData)
      });
      closeAdminModal();
      await refreshAdminList();
      alert('更新成功');
    } catch(e) {
      alert('更新失败: ' + e.message);
    }
  }

  async function deleteAdmin(id) {
    if (!confirm('确定要删除这个管理员账号吗？')) return;
    try {
      await fetch(`/api/admin/accounts/${id}`, { method: 'DELETE' });
      await refreshAdminList();
      alert('删除成功');
    } catch(e) {
      alert('删除失败');
    }
  }

  function startRefresh() {
    loadPanel('ai-chats');
    setInterval(() => {
      if (!['human','knowledge','rules','unanswered','learn','admins'].includes(currentPanel)) {
        loadPanel(currentPanel);
      }
    }, 3000);
  }
</script>
</body>
</html>
