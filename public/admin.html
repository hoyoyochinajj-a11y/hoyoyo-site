<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOYOYO 智能 AI 客服 V5.0 - 企业级管理后台</title>
<style>
  /* ===== 设计系统变量 ===== */
  :root {
    --primary-dark: #0a1628;
    --primary-deep: #0d1e36;
    --primary-mid: #132742;
    --accent-blue: #3b82f6;
    --accent-cyan: #06b6d4;
    --accent-purple: #8b5cf6;
    --silver: #94a3b8;
    --silver-light: #cbd5e1;
    --silver-dark: #64748b;
    --glass-bg: rgba(13, 30, 54, 0.75);
    --glass-border: rgba(148, 163, 184, 0.12);
    --gradient-fluid: linear-gradient(135deg, #0a1628 0%, #132742 50%, #0d1e36 100%);
    --gradient-accent: linear-gradient(135deg, #3b82f6 0%, #06b6d4 50%, #8b5cf6 100%);
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
    --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.3);
    --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.4);
    --shadow-glow: 0 0 40px rgba(59, 130, 246, 0.15);
  }

  /* ===== 全局重置 & 基础 ===== */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: "Inter", "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--gradient-fluid);
    color: var(--silver-light);
    line-height: 1.6;
    overflow: hidden;
  }

  /* ===== 自定义滚动条 ===== */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: rgba(148, 163, 184, 0.2);
    border-radius: 3px;
  }
  ::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.35); }

  /* ===== 登录遮罩 ===== */
  .login-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, rgba(10, 22, 40, 0.95) 0%, rgba(5, 10, 20, 0.98) 100%);
    backdrop-filter: blur(30px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  .login-box {
    background: var(--glass-bg);
    backdrop-filter: blur(40px);
    border: 1px solid var(--glass-border);
    padding: 56px 48px;
    border-radius: 24px;
    text-align: center;
    box-shadow: var(--shadow-lg), var(--shadow-glow);
    min-width: 400px;
    position: relative;
    overflow: hidden;
  }
  .login-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.5), transparent);
  }
  .login-box h3 {
    background: var(--gradient-accent);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-size: 28px;
    margin-bottom: 40px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .login-box input {
    padding: 16px 22px;
    width: 100%;
    margin: 10px 0;
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.03);
    color: var(--silver-light);
    font-size: 15px;
    outline: none;
    transition: all 0.3s ease;
  }
  .login-box input::placeholder { color: var(--silver-dark); }
  .login-box input:focus {
    border-color: rgba(59, 130, 246, 0.5);
    background: rgba(59, 130, 246, 0.05);
    box-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
  }
  .login-box button {
    padding: 16px 56px;
    margin-top: 28px;
    background: var(--gradient-accent);
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    transition: all 0.3s ease;
    letter-spacing: 1px;
  }
  .login-box button:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(59, 130, 246, 0.4);
  }

  /* ===== 主容器布局 ===== */
  .app-container {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ===== 顶部状态栏 ===== */
  .top-bar {
    height: 64px;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
  }
  .logo-section {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo-icon {
    width: 40px;
    height: 40px;
    background: var(--gradient-accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
  }
  .logo-text {
    background: var(--gradient-accent);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .logo-sub {
    color: var(--silver-dark);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    margin-left: 8px;
  }
  .status-section {
    display: flex;
    align-items: center;
    gap: 32px;
  }
  .status-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    background: rgba(255, 255, 255, 0.03);
    border-radius: 10px;
    border: 1px solid var(--glass-border);
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  .status-dot.online { background: #10b981; box-shadow: 0 0 8px #10b981; }
  .status-dot.busy { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; }
  .status-dot.normal { background: #3b82f6; box-shadow: 0 0 8px #3b82f6; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .status-label {
    font-size: 12px;
    color: var(--silver-dark);
    font-weight: 500;
  }
  .status-value {
    font-size: 14px;
    color: var(--silver-light);
    font-weight: 600;
  }

  /* ===== 主体布局 ===== */
  .body-container {
    display: flex;
    flex: 1;
    margin-top: 64px;
    height: calc(100vh - 64px);
  }

  /* ===== 左侧侧边栏 ===== */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: linear-gradient(180deg, var(--primary-dark) 0%, var(--primary-deep) 100%);
    border-right: 1px solid var(--glass-border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    position: relative;
  }
  .sidebar::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 1px; height: 100%;
    background: linear-gradient(180deg, rgba(59, 130, 246, 0.2) 0%, transparent 50%, rgba(139, 92, 246, 0.1) 100%);
  }
  .sidebar-header {
    padding: 24px 20px;
    border-bottom: 1px solid var(--glass-border);
  }
  .sidebar-title {
    font-size: 11px;
    color: var(--silver-dark);
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .sidebar-nav {
    padding: 16px 12px;
    flex: 1;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    margin: 4px 0;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 14px;
    color: var(--silver);
    border-left: 3px solid transparent;
    position: relative;
  }
  .nav-item:hover {
    background: rgba(59, 130, 246, 0.08);
    color: var(--silver-light);
  }
  .nav-item.active {
    background: rgba(59, 130, 246, 0.12);
    color: white;
    border-left-color: #3b82f6;
  }
  .nav-item.active::before {
    content: '';
    position: absolute;
    left: -3px;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 24px;
    background: var(--gradient-accent);
    border-radius: 0 3px 3px 0;
    box-shadow: 0 0 12px rgba(59, 130, 246, 0.5);
  }
  .nav-icon {
    width: 22px;
    text-align: center;
    font-size: 16px;
  }
  .nav-text {
    font-weight: 500;
  }
  .nav-badge {
    margin-left: auto;
    padding: 2px 8px;
    background: #ef4444;
    color: white;
    font-size: 11px;
    font-weight: 600;
    border-radius: 10px;
    min-width: 18px;
    text-align: center;
  }

  /* ===== 主内容区 ===== */
  .main-content {
    flex: 1;
    padding: 32px;
    overflow-y: auto;
    background: transparent;
    position: relative;
  }
  .main-content::before {
    content: '';
    position: fixed;
    top: 64px; right: 0;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(59, 130, 246, 0.03) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== 页面标题 ===== */
  .page-header {
    margin-bottom: 32px;
  }
  .page-title {
    font-size: 28px;
    font-weight: 700;
    color: white;
    letter-spacing: -0.5px;
  }
  .page-subtitle {
    font-size: 14px;
    color: var(--silver-dark);
    margin-top: 6px;
  }

  /* ===== 统计卡片网格 ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 24px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent-gradient, linear-gradient(90deg, transparent, var(--card-accent, #3b82f6), transparent));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .stat-card:hover {
    background: rgba(13, 30, 54, 0.9);
    border-color: rgba(148, 163, 184, 0.2);
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
  }
  .stat-card:hover::before { opacity: 1; }
  .stat-card.blue { --card-accent: #3b82f6; }
  .stat-card.green { --card-accent: #10b981; }
  .stat-card.amber { --card-accent: #f59e0b; }
  .stat-card.rose { --card-accent: #f43f5e; }
  .stat-icon-wrap {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
  }
  .stat-icon-wrap.blue {
    background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(59, 130, 246, 0.05));
    border: 1px solid rgba(59, 130, 246, 0.2);
  }
  .stat-icon-wrap.green {
    background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(16, 185, 129, 0.05));
    border: 1px solid rgba(16, 185, 129, 0.2);
  }
  .stat-icon-wrap.amber {
    background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(245, 158, 11, 0.05));
    border: 1px solid rgba(245, 158, 11, 0.2);
  }
  .stat-icon-wrap.rose {
    background: linear-gradient(135deg, rgba(244, 63, 94, 0.2), rgba(244, 63, 94, 0.05));
    border: 1px solid rgba(244, 63, 94, 0.2);
  }
  .stat-info { flex: 1; }
  .stat-label {
    color: var(--silver-dark);
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .stat-value {
    color: white;
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 8px;
  }
  .stat-trend {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 500;
  }
  .stat-trend.up { color: #10b981; }
  .stat-trend.down { color: #ef4444; }

  /* ===== 内容面板 ===== */
  .panel {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .panel-title {
    font-size: 16px;
    font-weight: 600;
    color: white;
  }

  /* ===== 图表占位区 ===== */
  .chart-placeholder {
    height: 300px;
    background: rgba(255, 255, 255, 0.02);
    border-radius: 12px;
    border: 1px dashed var(--glass-border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--silver-dark);
    font-size: 14px;
  }

  /* ===== 对话消息 ===== */
  .chat-message {
    margin: 12px 0;
    padding: 18px 22px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    color: var(--silver-light);
    transition: all 0.25s ease;
    line-height: 1.7;
  }
  .chat-message:hover {
    background: rgba(255, 255, 255, 0.05);
    border-color: rgba(148, 163, 184, 0.2);
  }
  .chat-message b { color: #60a5fa; font-weight: 600; }
  .chat-message small { color: var(--silver-dark); font-size: 12px; }

  /* ===== 通知 ===== */
  .notification {
    position: fixed;
    top: 80px;
    right: 32px;
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: white;
    padding: 16px 28px;
    border-radius: 12px;
    display: none;
    z-index: 200;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 12px 40px rgba(239, 68, 68, 0.35);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  /* ===== 人工客服面板 ===== */
  .human-service-container {
    display: flex;
    height: calc(100vh - 128px);
    gap: 24px;
  }
  .user-list-panel {
    width: 300px;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .user-list-header {
    padding: 20px;
    border-bottom: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .user-list-title {
    font-size: 14px;
    font-weight: 600;
    color: white;
  }
  .user-list-count {
    padding: 4px 10px;
    background: rgba(59, 130, 246, 0.15);
    color: #60a5fa;
    font-size: 12px;
    font-weight: 600;
    border-radius: 20px;
  }
  .user-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }
  .user-item {
    padding: 14px 16px;
    cursor: pointer;
    border-radius: 10px;
    margin-bottom: 8px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid transparent;
    transition: all 0.25s ease;
    position: relative;
  }
  .user-item:hover {
    background: rgba(59, 130, 246, 0.08);
    border-color: rgba(59, 130, 246, 0.15);
  }
  .user-item.active {
    background: rgba(59, 130, 246, 0.12);
    border-color: rgba(59, 130, 246, 0.25);
  }
  .user-item.has-unread::after {
    content: '';
    position: absolute;
    top: 14px;
    right: 14px;
    width: 8px;
    height: 8px;
    background: #ef4444;
    border-radius: 50%;
    box-shadow: 0 0 8px #ef4444;
  }
  .user-email {
    font-size: 14px;
    font-weight: 500;
    color: var(--silver-light);
    margin-bottom: 4px;
  }
  .user-meta {
    font-size: 12px;
    color: var(--silver-dark);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .unread-badge {
    padding: 2px 8px;
    background: #ef4444;
    color: white;
    font-size: 11px;
    font-weight: 600;
    border-radius: 10px;
  }

  /* ===== 聊天区域 ===== */
  .chat-panel {
    flex: 1;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .chat-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255, 255, 255, 0.02);
  }
  .chat-user-info {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .user-avatar {
    width: 42px;
    height: 42px;
    background: var(--gradient-accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }
  .user-details h4 {
    font-size: 15px;
    font-weight: 600;
    color: white;
    margin-bottom: 4px;
  }
  .user-details span {
    font-size: 12px;
    color: var(--silver-dark);
  }
  .transfer-notice {
    padding: 8px 16px;
    background: rgba(245, 158, 11, 0.1);
    border: 1px solid rgba(245, 158, 11, 0.2);
    border-radius: 8px;
    font-size: 13px;
    color: #fbbf24;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .message {
    display: flex;
    gap: 12px;
    max-width: 75%;
  }
  .message.user {
    align-self: flex-end;
    flex-direction: row-reverse;
  }
  .message.agent {
    align-self: flex-start;
  }
  .message-bubble {
    padding: 14px 18px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.6;
    position: relative;
  }
  .message.user .message-bubble {
    background: var(--gradient-accent);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .message.agent .message-bubble {
    background: rgba(255, 255, 255, 0.05);
    color: var(--silver-light);
    border: 1px solid var(--glass-border);
    border-bottom-left-radius: 4px;
  }
  .message-time {
    font-size: 11px;
    color: var(--silver-dark);
    margin-top: 6px;
  }
  .chat-input-area {
    padding: 20px 24px;
    border-top: 1px solid var(--glass-border);
    background: rgba(255, 255, 255, 0.02);
  }
  .input-row {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
  }
  .chat-input {
    flex: 1;
    padding: 14px 18px;
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.03);
    color: var(--silver-light);
    font-size: 14px;
    outline: none;
    transition: all 0.3s ease;
  }
  .chat-input::placeholder { color: var(--silver-dark); }
  .chat-input:focus {
    border-color: rgba(59, 130, 246, 0.4);
    background: rgba(59, 130, 246, 0.05);
  }
  .btn-send {
    padding: 14px 28px;
    background: var(--gradient-accent);
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.3s ease;
  }
  .btn-send:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
  }

  /* ===== 表单组 ===== */
  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block;
    color: var(--silver);
    font-size: 13px;
    margin-bottom: 8px;
    font-weight: 500;
  }
  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 14px 18px;
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.03);
    color: var(--silver-light);
    font-size: 14px;
    outline: none;
    transition: all 0.3s ease;
  }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    border-color: rgba(59, 130, 246, 0.4);
    background: rgba(59, 130, 246, 0.05);
  }
  .form-group textarea {
    resize: vertical;
    min-height: 100px;
  }
  .form-group select option {
    background: var(--primary-deep);
    color: var(--silver-light);
  }

  /* ===== 按钮 ===== */
  .btn {
    background: var(--gradient-accent);
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 12px;
    cursor: pointer;
    margin-right: 10px;
    font-size: 14px;

<script>
  let currentPanel = 'dashboard';
  let selectedUserId = null;
  let humanRefresh = null;
  let panelRefresh = null;
  let currentAdmin = null;
  let unreadUsers = new Set();

  async function login() {
    const username = document.getElementById('usernameInput').value.trim();
    const pwd = document.getElementById('passwordInput').value;

    if (!username) {
      alert('请输入账号');
      return;
    }

    const res = await fetch('/api/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ username, password: pwd })
    });

    if (res.ok) {
      const data = await res.json();
      currentAdmin = data.admin;
      document.getElementById('loginOverlay').style.display = 'none';
      applyPermissions();
      startRefresh();
    } else {
      const err = await res.json();
      alert(err.error || '登录失败');
    }
  }

  function applyPermissions() {
    if (!currentAdmin) return;
    const permissions = currentAdmin.permissions || [];
    const isSuperAdmin = currentAdmin.role === 'superadmin' || permissions.includes('all');

    const menuItems = document.querySelectorAll('.nav-item');
    const panels = ['dashboard', 'ai-chats', 'human', 'rules', 'knowledge', 'unanswered', 'suggests', 'demands', 'emails', 'learn', 'admins'];

    menuItems.forEach((item, idx) => {
      const panelName = panels[idx];
      if (panelName === 'dashboard') {
        item.style.display = 'flex';
      } else if (panelName === 'admins') {
        item.style.display = isSuperAdmin ? 'flex' : 'none';
      } else if (!isSuperAdmin) {
        item.style.display = permissions.includes(panelName) ? 'flex' : 'none';
      } else {
        item.style.display = 'flex';
      }
    });
  }

  function switchPanel(name) {
    currentPanel = name;
    if (humanRefresh) { clearInterval(humanRefresh); humanRefresh = null; }
    if (panelRefresh) { clearInterval(panelRefresh); panelRefresh = null; }

    // 更新导航状态
    document.querySelectorAll('.nav-item').forEach(d => d.classList.remove('active'));
    const activeNav = document.querySelector(`.nav-item[data-panel="${name}"]`);
    if (activeNav) activeNav.classList.add('active');

    loadPanel(name);
  }

  async function fetchJSON(url, options) {
    try {
      const res = await fetch(url, options);
      if (!res.ok) throw new Error('请求失败');
      return res.json();
    } catch(e) {
      console.warn('fetchJSON error:', url, e);
      return null;
    }

  // ────── 人工客服局部刷新 ──────
  async function refreshHumanData() {
    try {
      await loadUsers();
      if (selectedUserId) await loadChat();
    } catch(e) {}
  }

  async function loadUsers() {
    const div = document.getElementById('userList');
    const countEl = document.getElementById('userCount');
    if (!div) return;
    try {
      const users = await fetchJSON('/api/human-user-list');
      if (!users || !Array.isArray(users)) {
        console.warn('loadUsers: no users data');
        return;
      }

      // 更新未读用户计数（添加转接提示功能）
      let hasUnread = false;
      users.forEach(u => {
        if (u.unread > 0) {
          unreadUsers.add(u.userId);
          hasUnread = true;
        }
      });

      // 更新侧边栏红点提醒
      const badge = document.getElementById('humanBadge');
      if (badge) {
        if (unreadUsers.size > 0) {
          badge.textContent = unreadUsers.size;
          badge.style.display = 'block';
        } else {
          badge.style.display = 'none';
        }
      }

      if (countEl) countEl.textContent = users.length;

      div.innerHTML = users.map(u => {
        const hasUnreadMsg = u.unread > 0;
        const displayName = u.email || (u.userId ? atob(u.userId) : '未知用户');
        return `<div class="user-item ${u.userId===selectedUserId?'active':''} ${hasUnreadMsg?'has-unread':''}" onclick="selectUser('${u.userId}')">
          <div class="user-email">${displayName}</div>
          <div class="user-meta">
            <span>未读:${u.unread || 0}</span>
            ${hasUnreadMsg ? '<span class="unread-badge">新</span>' : ''}
          </div>
        </div>`;
      }).join('');
    } catch(e) {
      console.error('loadUsers error:', e);
    }
  }

  async function selectUser(uid) {
    selectedUserId = uid;
    unreadUsers.delete(uid);

    // 更新侧边栏红点
    const badge = document.getElementById('humanBadge');
    if (badge) {
      if (unreadUsers.size > 0) {
        badge.textContent = unreadUsers.size;
        badge.style.display = 'block';
      } else {
        badge.style.display = 'none';
      }
    }

    try {
      const users = await fetchJSON('/api/human-user-list') || [];
      const user = users.find(u => u.userId === uid);
      const userNameEl = document.getElementById('chatUserName');
      const userStatusEl = document.getElementById('chatUserStatus');
      const transferNotice = document.getElementById('transferNotice');

      if (userNameEl) userNameEl.textContent = user?.email || atob(uid);
      if (userStatusEl) userStatusEl.textContent = '在线对话中';
      if (transferNotice) transferNotice.style.display = 'flex';
    } catch(e) {}

    await loadChat();
    await loadNote();

  async function loadChat() {
    const box = document.getElementById('humanChatBox');
    if (!box || !selectedUserId) return;
    try {
      const res = await fetch(`/api/human-history?userId=${encodeURIComponent(selectedUserId)}`);
      const data = await res.json();
      if (!data || !data.messages) return;
      
      // 保存图片数据到localStorage
      data.messages.forEach(m => {
        if (m.imageData) {
          const imageMatch = m.content.match(/\[IMAGE:([^\]]+)\]/);
          if (imageMatch) {
            const imageId = imageMatch[1];
            localStorage.setItem(imageId, m.imageData);
          }
        }
      });
      
      // 保存当前滚动位置
      const wasAtBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 50;
      box.innerHTML = data.messages.map(m => {
        // 检查是否是图片消息
        let contentHtml = m.content;
        const imageMatch = m.content.match(/\[IMAGE:([^\]]+)\]/);
        if (imageMatch) {
          const imageId = imageMatch[1];
          // 尝试从localStorage获取图片（包括服务器返回的）
          let imageSrc = localStorage.getItem(imageId);
          if (!imageSrc && m.imageData) {
            imageSrc = m.imageData;
            localStorage.setItem(imageId, imageSrc);
          }
          if (imageSrc) {
            contentHtml = `<img src="${imageSrc}" style="max-width:200px;max-height:150px;border-radius:8px;display:block;cursor:pointer;" onclick="window.open(this.src)" />`;
          } else {
            contentHtml = '<span style="color:rgba(255,255,255,0.5);">[图片]</span>';
          }
        }
        return `
        <div class="message ${m.sender==='user'?'user':'agent'}">
          <div class="message-bubble">
            ${contentHtml}
            <div class="message-time">${new Date(m.time).toLocaleTimeString()}</div>
          </div>
        </div>
      `;
      }).join('');
      if (wasAtBottom) box.scrollTop = box.scrollHeight;
    } catch(e) {}
  }

  async function sendReply() {
    if (!selectedUserId) return alert('请先选择用户');
    const input = document.getElementById('humanReplyInput');
    if (!input) return;
    const msg = input.value.trim();
    if (!msg) return;

    // 检查是否有待发送的图片
    let messageToSend = msg;
    let imageDataToSend = null;
    const pendingImageId = input.dataset.pendingImageId;
    const pendingImage = input.dataset.pendingImage;
    if (pendingImageId && msg.includes('[图片]')) {
      messageToSend = msg.replace('[图片]', `[IMAGE:${pendingImageId}]`);
      imageDataToSend = pendingImage ? pendingImage.substring(0, 50000) : null; // 最多发送50KB
    }

    try {
      const res = await fetch('/api/human-reply', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ userId: selectedUserId, message: messageToSend, imageData: imageDataToSend })
      });
      if (!res.ok) {
        const data = await res.json();
        throw new Error(data.error || '发送失败');
      }
      input.value = '';
      delete input.dataset.pendingImageId;
      delete input.dataset.pendingImage;
      await loadChat();
    } catch (err) {
      alert('发送失败: ' + err.message);
      console.error('sendReply error:', err);
    }
  }

  function filterChats() {
    const dateFilter = document.getElementById('chatDateFilter')?.value;
    const keywordFilter = document.getElementById('chatKeywordFilter')?.value.toLowerCase();
    const userFilter = document.getElementById('chatUserFilter')?.value;
    const listDiv = document.getElementById('list');
    const statsDiv = document.getElementById('chatStats');
    
    if (!listDiv) return;
    
    let filtered = allChatsData;
    
    // 按日期筛选
    if (dateFilter) {
      const filterDate = new Date(dateFilter).toDateString();
      filtered = filtered.filter(c => new Date(c.time).toDateString() === filterDate);
    }
    
    // 按用户筛选
    if (userFilter) {
      filtered = filtered.filter(c => c.email === userFilter);
    }
    
    // 按关键词筛选
    if (keywordFilter) {
      filtered = filtered.filter(c => 
        (c.message && c.message.toLowerCase().includes(keywordFilter)) ||
        (c.reply && c.reply.toLowerCase().includes(keywordFilter)) ||
        (c.email && c.email.toLowerCase().includes(keywordFilter))
      );
    }
    
    // 按用户分组显示
    const grouped = filtered.reduce((acc, chat) => {
      const email = chat.email || '匿名用户';
      if (!acc[email]) acc[email] = [];
      acc[email].push(chat);
      return acc;
    }, {});
    
    // 更新统计
    if (statsDiv) {
      statsDiv.innerHTML = `共 ${filtered.length} 条对话，${Object.keys(grouped).length} 位用户`;
    }
    
    // 渲染列表
    if (filtered.length === 0) {
      listDiv.innerHTML = '<div class="empty-state"><div class="empty-state-icon">💬</div><div class="empty-state-text">暂无对话记录</div></div>';
      return;
    }
    
    listDiv.innerHTML = Object.entries(grouped).map(([email, chats]) => `
      <div class="chat-group" style="margin-bottom:16px;background:rgba(255,255,255,0.05);border-radius:12px;overflow:hidden;">
        <div class="chat-group-header" style="padding:12px 16px;background:rgba(99,102,241,0.2);display:flex;justify-content:space-between;align-items:center;cursor:pointer;" onclick="toggleChatGroup(this)">
          <div>
            <b>📧 ${email}</b>
            <span style="margin-left:12px;color:rgba(255,255,255,0.6);font-size:12px;">${chats.length} 条对话</span>
          </div>
          <span class="toggle-icon" style="transition:transform 0.3s;">▼</span>
        </div>
        <div class="chat-group-content" style="max-height:400px;overflow-y:auto;">
          ${chats.map(c => `
            <div class="chat-message" style="border-bottom:1px solid rgba(255,255,255,0.05);padding:12px 16px;">
              <small style="color:rgba(255,255,255,0.5);">${new Date(c.time).toLocaleString()}</small><br>
              <b style="color:#a5b4fc;">问：</b>${escapeHtml(c.message)}<br>
              <b style="color:#86efac;">答：</b>${escapeHtml(c.reply)}
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');
  }
  
  function toggleChatGroup(header) {
    const content = header.nextElementSibling;
    const icon = header.querySelector('.toggle-icon');
    if (content.style.maxHeight === '0px') {
      content.style.maxHeight = '400px';
      icon.style.transform = 'rotate(0deg)';
    } else {
      content.style.maxHeight = '0px';
      icon.style.transform = 'rotate(-90deg)';
    }
  }
  
  function escapeHtml(text) {
    if (!text) return '';
    return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  
  function exportChats() {
    const dateFilter = document.getElementById('chatDateFilter')?.value;
    const keywordFilter = document.getElementById('chatKeywordFilter')?.value;
    const userFilter = document.getElementById('chatUserFilter')?.value;
    
    let filtered = allChatsData;
    if (dateFilter) {
      const filterDate = new Date(dateFilter).toDateString();
      filtered = filtered.filter(c => new Date(c.time).toDateString() === filterDate);
    }
    if (userFilter) filtered = filtered.filter(c => c.email === userFilter);
    if (keywordFilter) {
      filtered = filtered.filter(c => 
        (c.message && c.message.toLowerCase().includes(keywordFilter.toLowerCase())) ||
        (c.reply && c.reply.toLowerCase().includes(keywordFilter.toLowerCase()))
      );
    }
    
    const csv = [
      ['时间', '用户邮箱', '问题', '回复'].join(','),
      ...filtered.map(c => [
        new Date(c.time).toLocaleString(),
        c.email || '',
        '"' + (c.message || '').replace(/"/g, '""') + '"',
        '"' + (c.reply || '').replace(/"/g, '""') + '"'
      ].join(','))
    ].join('\n');
    
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `对话记录_${new Date().toISOString().split('T')[0]}.csv`;
    link.click();
  }

  // 后台人工客服图片上传
  function handleAdminImageUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (!file.type.startsWith('image/')) {
      alert('请选择图片文件');
      return;
    }
    if (file.size > 5 * 1024 * 1024) {
      alert('图片大小不能超过5MB');
      return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
      const base64 = e.target.result;
      // 生成图片ID并保存到localStorage
      const imageId = 'admin_img_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
      try {
        localStorage.setItem(imageId, base64);
      } catch(err) {
        // 清理旧图片
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key && key.startsWith('admin_img_')) {
            localStorage.removeItem(key);
          }
        }
        localStorage.setItem(imageId, base64);
      }
      // 将图片标记添加到输入框
      const input = document.getElementById('humanReplyInput');
      if (input) {
        input.dataset.pendingImageId = imageId;
        input.dataset.pendingImage = base64;
        input.value += ' [图片]';
        input.focus();
      }
    };
    reader.readAsDataURL(file);
  }

    modal.id = 'adminModal';
    modal.innerHTML = `<div class="modal-content">
      <h3>编辑管理员</h3>
      <div class="form-group">
        <label>账号</label>
        <input type="text" id="editAdminUsername" value="${admin.username}">
      </div>
      <div class="form-group">
        <label>新密码（留空则不修改）</label>
        <input type="password" id="editAdminPassword" placeholder="留空则不修改">
      </div>
      <div class="form-group">
        <label>角色</label>
        <select id="editAdminRole">
          <option value="admin" ${admin.role !== 'superadmin' ? 'selected' : ''}>普通管理员</option>
          <option value="superadmin" ${admin.role === 'superadmin' ? 'selected' : ''}>超级管理员</option>
        </select>
      </div>
      <div class="form-group">
        <label>权限（普通管理员时生效）</label>
        <div class="checkbox-group" id="permissionCheckboxes">
          <label><input type="checkbox" value="ai-chats" ${admin.permissions?.includes('ai-chats') || admin.permissions?.includes('all') ? 'checked' : ''}> AI对话</label>
          <label><input type="checkbox" value="suggests" ${admin.permissions?.includes('suggests') || admin.permissions?.includes('all') ? 'checked' : ''}> 建议列表</label>
          <label><input type="checkbox" value="demands" ${admin.permissions?.includes('demands') || admin.permissions?.includes('all') ? 'checked' : ''}> 需求列表</label>
          <label><input type="checkbox" value="human" ${admin.permissions?.includes('human') || admin.permissions?.includes('all') ? 'checked' : ''}> 人工客服</label>
          <label><input type="checkbox" value="emails" ${admin.permissions?.includes('emails') || admin.permissions?.includes('all') ? 'checked' : ''}> 用户邮箱</label>
          <label><input type="checkbox" value="knowledge" ${admin.permissions?.includes('knowledge') || admin.permissions?.includes('all') ? 'checked' : ''}> 知识库</label>
          <label><input type="checkbox" value="rules" ${admin.permissions?.includes('rules') || admin.permissions?.includes('all') ? 'checked' : ''}> 规则管理</label>
          <label><input type="checkbox" value="unanswered" ${admin.permissions?.includes('unanswered') || admin.permissions?.includes('all') ? 'checked' : ''}> 疑难记录</label>
          <label><input type="checkbox" value="learn" ${admin.permissions?.includes('learn') || admin.permissions?.includes('all') ? 'checked' : ''}> 学习URL</label>
        </div>
      </div>
      <div style="text-align:right;margin-top:20px;">
        <button class="btn secondary" onclick="closeAdminModal()">取消</button>
        <button class="btn success" onclick="updateAdmin('${id}')">保存</button>
      </div>
    </div>`;
    document.body.appendChild(modal);
  }

  function closeAdminModal() {
    const modal = document.getElementById('adminModal');
    if (modal) modal.remove();
  }

  async function createAdmin() {
    const username = document.getElementById('newAdminUsername').value.trim();
    const password = document.getElementById('newAdminPassword').value;
    const role = document.getElementById('newAdminRole').value;
    const checkboxes = document.querySelectorAll('#permissionCheckboxes input:checked');
    const permissions = Array.from(checkboxes).map(cb => cb.value);

    if (!username || !password) return alert('账号和密码不能为空');

    try {
      await fetchJSON('/api/admin/accounts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password, role, permissions })
      });
      closeAdminModal();
      await refreshAdminList();
      showNotification('创建成功');
    } catch(e) {
      alert('创建失败: ' + e.message);
    }
  }

  async function updateAdmin(id) {
    const username = document.getElementById('editAdminUsername').value.trim();
    const password = document.getElementById('editAdminPassword').value;
    const role = document.getElementById('editAdminRole').value;
    const checkboxes = document.querySelectorAll('#permissionCheckboxes input:checked');
    const permissions = Array.from(checkboxes).map(cb => cb.value);

    if (!username) return alert('账号不能为空');

    const updateData = { username, role, permissions };
    if (password) updateData.password = password;

    try {
      await fetchJSON(`/api/admin/accounts/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(updateData)
      });
      closeAdminModal();
      await refreshAdminList();
      showNotification('更新成功');
    } catch(e) {
      alert('更新失败: ' + e.message);
    }
  }

  async function deleteAdmin(id) {
    if (!confirm('确定要删除这个管理员账号吗？')) return;
    try {
      await fetch(`/api/admin/accounts/${id}`, { method: 'DELETE' });
      await refreshAdminList();
      showNotification('删除成功');
    } catch(e) {
      alert('删除失败');
    }
  }

  function startRefresh() {
    loadPanel('dashboard');
    // 只刷新需要实时数据的面板
    setInterval(() => {
      if (currentPanel === 'human') refreshHumanData();
    }, 3000);
  }
</script>
</body>
</html>
