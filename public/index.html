<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOYOYO 智能客服</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --primary: #6366f1;
      --primary-light: #818cf8;
      --secondary: #8b5cf6;
      --accent: #06b6d4;
      --bg-dark: #0f0f23;
      --bg-card: rgba(255, 255, 255, 0.1);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --glass-bg: rgba(255, 255, 255, 0.15);
      --glass-border: rgba(255, 255, 255, 0.2);
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 30%, #4c1d95 60%, #581c87 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    /* 背景装饰 */
    .bg-decoration {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }
    
    .bg-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
    }
    
    .bg-blob-1 {
      width: 400px;
      height: 400px;
      background: var(--primary);
      top: -100px;
      right: -100px;
    }
    
    .bg-blob-2 {
      width: 300px;
      height: 300px;
      background: var(--secondary);
      bottom: -50px;
      left: -50px;
    }
    
    .bg-blob-3 {
      width: 200px;
      height: 200px;
      background: var(--accent);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    
    /* 主容器 */
    .welcome-container {
      text-align: center;
      color: var(--text-primary);
      z-index: 10;
      padding: 40px;
    }
    
    .logo {
      font-size: 48px;
      font-weight: 600;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #fff 0%, #c7d2fe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .subtitle {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }
    
    .start-btn {
      padding: 16px 48px;
      font-size: 16px;
      font-weight: 500;
      color: white;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 40px rgba(99, 102, 241, 0.4);
    }
    
    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 50px rgba(99, 102, 241, 0.5);
    }
    
    /* 聊天窗口 */
    .chat-widget {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1000;
    }
    
    .chat-bubble {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.4);
      transition: all 0.3s ease;
    }
    
    .chat-bubble:hover {
      transform: scale(1.1);
    }
    
    .chat-bubble svg {
      width: 28px;
      height: 28px;
      fill: white;
    }
    
    .chat-window {
      position: absolute;
      bottom: 80px;
      right: 0;
      width: 380px;
      height: 520px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      display: none;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3);
    }
    
    .chat-window.open {
      display: flex;
      animation: slideUp 0.3s ease;
    }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* 聊天头部 */
    .chat-header {
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .chat-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, var(--primary) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .chat-avatar svg {
      width: 24px;
      height: 24px;
      fill: white;
    }
    
    .chat-title {
      flex: 1;
    }
    
    .chat-title h3 {
      font-size: 16px;
      font-weight: 600;
      color: white;
    }
    
    .chat-title span {
      font-size: 12px;
      color: var(--text-secondary);
    }
    
    .close-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    
    .close-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    
    .close-btn svg {
      width: 16px;
      height: 16px;
      stroke: white;
    }
    
    /* 消息区域 */
    .chat-messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .message {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
      border-bottom-right-radius: 4px;
    }
    
    .message.ai {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      border-bottom-left-radius: 4px;
    }
    
    .message .time {
      font-size: 10px;
      opacity: 0.6;
      margin-top: 4px;
      display: block;
    }
    
    /* 快捷回复 */
    .quick-replies {
      padding: 8px 16px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      border-top: 1px solid var(--glass-border);
    }
    
    .quick-reply {
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      color: white;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    
    .quick-reply:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    
    /* 输入区域 */
    .chat-input {
      padding: 16px;
      background: rgba(255, 255, 255, 0.05);
      border-top: 1px solid var(--glass-border);
      display: flex;
      gap: 12px;
      align-items: center;
    }
    
    .input-wrapper {
      flex: 1;
      position: relative;
    }
    
    .chat-input input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      color: white;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }
    
    .chat-input input::placeholder {
      color: var(--text-secondary);
    }
    
    .chat-input input:focus {
      background: rgba(255, 255, 255, 0.15);
      border-color: var(--primary);
    }
    
    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    
    .send-btn:hover {
      transform: scale(1.05);
    }
    
    .send-btn svg {
      width: 20px;
      height: 20px;
      fill: white;
    }
    
    /* 打字指示器 */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      align-self: flex-start;
    }
    
    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-secondary);
      animation: typing 1.4s infinite;
    }
    
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }
    
    /* 滚动条样式 */
    .chat-messages::-webkit-scrollbar {
      width: 6px;
    }
    
    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }
    
    .chat-messages::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }
    
    /* 响应式 */
    @media (max-width: 480px) {
      .chat-window {
        width: calc(100vw - 32px);
        height: calc(100vh - 120px);
        bottom: 70px;
        right: -8px;
      }
    }
  </style>
</head>
<body>
  <!-- 背景装饰 -->
  <div class="bg-decoration">
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
    <div class="bg-blob bg-blob-3"></div>
  </div>
  
  <!-- 欢迎页面 -->
  <div class="welcome-container" id="welcomePage">
    <div class="logo">HOYOYO</div>
    <p class="subtitle">智能客服 · 随时为您服务</p>
    <button class="start-btn" onclick="openChat()">开始对话</button>
  </div>
  
  <!-- 聊天组件 -->
  <div class="chat-widget">
    <div class="chat-bubble" onclick="toggleChat()">
      <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
    </div>
    
    <div class="chat-window" id="chatWindow">
      <div class="chat-header">
        <div class="chat-avatar">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.53c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.07 5 7.41 0 2.08-.8 3.98-2.1 5.4z"/></svg>
        </div>
        <div class="chat-title">
          <h3>HOYOYO 智能助手</h3>
          <span>在线 · 通常几秒内回复</span>
        </div>
        <button class="close-btn" onclick="toggleChat()">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      
      <div class="chat-messages" id="chatMessages">
        <div class="message ai">
          您好！我是 HOYOYO 智能助手，很高兴为您服务。请问有什么可以帮助您的？
          <span class="time">刚刚</span>
        </div>
      </div>
      
      <div class="quick-replies">
        <button class="quick-reply" onclick="sendQuickReply('产品咨询')">产品咨询</button>
        <button class="quick-reply" onclick="sendQuickReply('订单查询')">订单查询</button>
        <button class="quick-reply" onclick="sendQuickReply('售后服务')">售后服务</button>
        <button class="quick-reply" onclick="sendQuickReply('联系人工')">联系人工</button>
      </div>
      
      <div class="chat-input">
        <div class="input-wrapper">
          <input type="text" id="messageInput" placeholder="输入您的问题..." onkeypress="handleKeyPress(event)">
        </div>
        <button class="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
  
  <script>
    let isOpen = false;
    let sessionId = Date.now().toString();
    
    function toggleChat() {
      isOpen = !isOpen;
      document.getElementById('chatWindow').classList.toggle('open', isOpen);
    }
    
    function openChat() {
      if (!isOpen) toggleChat();
    }
    
    function sendQuickReply(text) {
      addMessage(text, 'user');
      document.getElementById('messageInput').value = '';
      callAI(text);
    }
    
    function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text) return;
      
      addMessage(text, 'user');
      input.value = '';
      callAI(text);
    }
    
    function handleKeyPress(e) {
      if (e.key === 'Enter') sendMessage();
    }
    
    function addMessage(text, type) {
      const container = document.getElementById('chatMessages');
      const msg = document.createElement('div');
      msg.className = `message ${type}`;
      const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      msg.innerHTML = `${text}<span class="time">${time}</span>`;
      container.appendChild(msg);
      container.scrollTop = container.scrollHeight;
    }
    
    function showTyping() {
      const container = document.getElementById('chatMessages');
      const typing = document.createElement('div');
      typing.className = 'typing-indicator';
      typing.id = 'typingIndicator';
      typing.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
      container.appendChild(typing);
      container.scrollTop = container.scrollHeight;
    }
    
    function hideTyping() {
      const typing = document.getElementById('typingIndicator');
      if (typing) typing.remove();
    }
    
    async function callAI(text) {
      showTyping();
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, sessionId })
        });
        const data = await res.json();
        hideTyping();
        addMessage(data.reply || '抱歉，我暂时无法回答这个问题。', 'ai');
      } catch (e) {
        hideTyping();
        addMessage('网络连接失败，请稍后重试。', 'ai');
      }
    }
  </script>
</body>
</html>
