<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOYOYO 智能客服</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Microsoft YaHei", "Inter", sans-serif; background: linear-gradient(135deg, #1e1b4b 0%, #312e81 30%, #4c1d95 60%, #581c87 100%); min-height: 100vh; overflow: hidden; }

  /* 背景装饰 */
  .bg-orb { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.4; pointer-events: none; }
  .bg-orb-1 { width: 500px; height: 500px; background: #6366f1; top: -150px; right: -150px; }
  .bg-orb-2 { width: 400px; height: 400px; background: #8b5cf6; bottom: -100px; left: -100px; }
  .bg-orb-3 { width: 250px; height: 250px; background: #06b6d4; top: 40%; left: 30%; }

  /* 浮动气泡按钮 */
  .chat-fab { position: fixed; bottom: 28px; right: 28px; z-index: 1000; }
  .fab-btn { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 32px rgba(99,102,241,0.5); transition: all 0.3s ease; }
  .fab-btn:hover { transform: scale(1.1); box-shadow: 0 12px 40px rgba(99,102,241,0.6); }
  .fab-btn svg { width: 30px; height: 30px; fill: white; transition: transform 0.3s; }
  .fab-btn.active svg { transform: rotate(90deg); }
  .fab-badge { position: absolute; top: -4px; right: -4px; width: 20px; height: 20px; background: #ef4444; border-radius: 50%; border: 2px solid #1e1b4b; display: none; }

  /* 聊天窗口 */
  .chat-window { position: fixed; bottom: 104px; right: 28px; width: 400px; height: 560px; background: rgba(15,15,40,0.85); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.12); border-radius: 24px; z-index: 999; display: none; flex-direction: column; overflow: hidden; box-shadow: 0 30px 90px rgba(0,0,0,0.4); }
  .chat-window.open { display: flex; animation: windowIn 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
  @keyframes windowIn { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

  /* 头部 */
  .cw-header { padding: 18px 20px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .cw-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .cw-avatar.ai { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
  .cw-avatar.human { background: linear-gradient(135deg, #f97316, #ea580c); }
  .cw-title { flex: 1; }
  .cw-title h3 { color: white; font-size: 15px; font-weight: 600; }
  .cw-title span { font-size: 12px; display: flex; align-items: center; gap: 5px; }
  .cw-title span .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .cw-title span .dot.online { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
  .cw-title span .dot.busy { background: #f97316; box-shadow: 0 0 6px #f97316; }
  .cw-title .mode-tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; margin-left: 6px; }
  .cw-title .mode-tag.ai { background: rgba(99,102,241,0.25); color: #a5b4fc; }
  .cw-title .mode-tag.human { background: rgba(249,115,22,0.25); color: #fdba74; }
  .cw-close { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.08); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
  .cw-close:hover { background: rgba(255,255,255,0.15); }
  .cw-close svg { width: 16px; height: 16px; stroke: rgba(255,255,255,0.6); }

  /* 消息区域 */
  .cw-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
  .cw-messages::-webkit-scrollbar { width: 4px; }
  .cw-messages::-webkit-scrollbar-track { background: transparent; }
  .cw-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

  /* 消息气泡布局 - IM风格 */
  .msg { display: flex; gap: 10px; max-width: 85%; animation: msgIn 0.3s ease; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* 头像 */
  .msg-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .msg.ai .msg-avatar { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
  .msg.human-agent .msg-avatar { background: linear-gradient(135deg, #f97316, #ea580c); }
  .msg.user .msg-avatar { background: linear-gradient(135deg, #06b6d4, #0891b2); }

  /* 消息内容区域 */
  .msg-content { display: flex; flex-direction: column; max-width: calc(100% - 46px); }
  .msg.user .msg-content { align-items: flex-end; }
  .msg.ai .msg-content, .msg.human-agent .msg-content { align-items: flex-start; }

  /* 气泡 */
  .msg-bubble { padding: 12px 16px; border-radius: 18px; line-height: 1.6; word-break: break-word; font-size: 14px; position: relative; }

  /* AI/客服气泡 - 左侧带尾巴 */
  .msg.ai .msg-bubble { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.1); color: #e2e8f0; border-top-left-radius: 4px; }
  .msg.ai .msg-bubble::before {
    content: '';
    position: absolute;
    left: -6px;
    top: 12px;
    width: 0;
    height: 0;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    border-right: 6px solid rgba(255,255,255,0.12);
  }

  /* 人工客服气泡 - 左侧带尾巴 */
  .msg.human-agent .msg-bubble { background: rgba(249,115,22,0.15); border: 1px solid rgba(249,115,22,0.2); color: #fed7aa; border-top-left-radius: 4px; }
  .msg.human-agent .msg-bubble::before {
    content: '';
    position: absolute;
    left: -6px;
    top: 12px;
    width: 0;
    height: 0;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    border-right: 6px solid rgba(249,115,22,0.15);
  }

  /* 用户气泡 - 右侧带尾巴 */
  .msg.user .msg-bubble { background: linear-gradient(135deg, #6366f1, #818cf8); color: white; border-top-right-radius: 4px; }
  .msg.user .msg-bubble::before {
    content: '';
    position: absolute;
    right: -6px;
    top: 12px;
    width: 0;
    height: 0;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    border-left: 6px solid #818cf8;
  }

  .msg-bubble a { color: #93c5fd; text-decoration: underline; word-break: break-all; }

  /* 时间戳 */
  .msg-time { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 6px; padding: 0 4px; }

  /* 系统提示 */
  .sys-msg { text-align: center; font-size: 12px; color: rgba(255,255,255,0.4); padding: 6px 0; }
  .sys-msg span { background: rgba(255,255,255,0.06); padding: 4px 14px; border-radius: 12px; }

  /* 打字指示器 */
  .typing { display: flex; gap: 4px; padding: 14px 18px; background: rgba(255,255,255,0.1); border-radius: 18px; align-self: flex-start; width: fit-content; margin-left: 46px; border-top-left-radius: 4px; }
  .typing span { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.4); animation: bounce 1.4s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

  /* 快捷回复 */
  .cw-quick { padding: 8px 16px; display: flex; gap: 6px; overflow-x: auto; border-top: 1px solid rgba(255,255,255,0.06); }
  .cw-quick::-webkit-scrollbar { display: none; }
  .quick-chip { padding: 7px 14px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; color: rgba(255,255,255,0.7); font-size: 12px; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
  .quick-chip:hover { background: rgba(99,102,241,0.2); border-color: rgba(99,102,241,0.3); color: white; }

  /* 操作栏 */
  .cw-actions { padding: 6px 16px; display: flex; gap: 6px; }
  .action-btn { padding: 6px 12px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: rgba(255,255,255,0.6); font-size: 12px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 4px; }
  .action-btn:hover { background: rgba(255,255,255,0.12); color: white; }
  .action-btn.active { background: rgba(249,115,22,0.2); border-color: rgba(249,115,22,0.3); color: #fdba74; }

  /* 输入区域 - IM风格 */
  .cw-input-area { padding: 12px 16px 16px; border-top: 1px solid rgba(255,255,255,0.06); }
  .cw-input-wrapper { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.12); border-radius: 28px; }
  .cw-input-btn { width: 36px; height: 36px; border-radius: 50%; background: transparent; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; color: rgba(255,255,255,0.5); flex-shrink: 0; }
  .cw-input-btn:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }
  .cw-input-btn svg { width: 20px; height: 20px; }
  .cw-input { flex: 1; padding: 8px 4px; background: transparent; border: none; color: white; font-size: 14px; outline: none; }
  .cw-input::placeholder { color: rgba(255,255,255,0.35); }
  .cw-send { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .cw-send:hover { transform: scale(1.05); box-shadow: 0 4px 16px rgba(99,102,241,0.4); }
  .cw-send:disabled { background: rgba(255,255,255,0.15); cursor: not-allowed; transform: none; box-shadow: none; }
  .cw-send svg { width: 20px; height: 20px; fill: white; }

  /* 邮箱弹窗 */
  .email-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 2000; }
  .email-card { background: rgba(20,20,50,0.9); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.12); border-radius: 24px; padding: 40px; text-align: center; width: 360px; }
  .email-card .logo { font-size: 32px; font-weight: 700; background: linear-gradient(135deg, #fff, #c7d2fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
  .email-card .sub { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 28px; }
  .email-card input { width: 100%; padding: 14px 18px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; color: white; font-size: 14px; outline: none; }
  .email-card input::placeholder { color: rgba(255,255,255,0.35); }
  .email-card input:focus { border-color: #6366f1; }
  .email-card button { width: 100%; padding: 14px; margin-top: 16px; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; border: none; border-radius: 14px; font-size: 15px; font-weight: 500; cursor: pointer; transition: transform 0.2s; }
  .email-card button:hover { transform: scale(1.02); }

  /* 响应式 */
  @media (max-width: 480px) {
    .chat-window { width: calc(100vw - 24px); height: calc(100vh - 120px); bottom: 90px; right: 12px; border-radius: 20px; }
  }
</style>
</head>
<body>

<!-- 背景装饰 -->
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>

<!-- 浮动气泡 -->
<div class="chat-fab">
  <button class="fab-btn" id="fabBtn" onclick="toggleChat()">
    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
  </button>
  <div class="fab-badge" id="fabBadge"></div>
</div>

<!-- 聊天窗口 -->
<div class="chat-window" id="chatWindow">
  <div class="cw-header">
    <div class="cw-avatar ai" id="headerAvatar">🤖</div>
    <div class="cw-title">
      <h3 id="headerTitle">HOYOYO 智能助手</h3>
      <span><span class="dot online" id="statusDot"></span><span id="statusText">在线</span><span class="mode-tag ai" id="modeTag">AI</span></span>
      <div style="font-size:10px;color:rgba(255,255,255,0.35);margin-top:2px;">本回答由AI生成，仅供参考</div>
    </div>
    <button class="cw-close" onclick="toggleChat()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>

  <div class="cw-messages" id="chatBox"></div>

  <div class="cw-quick" id="quickReplies" style="display:flex;justify-content:center;gap:10px;">
    <button class="quick-chip" onclick="sendQuick('产品咨询')">产品咨询</button>
    <button class="quick-chip" onclick="sendQuick('物流查询')">物流查询</button>
    <button class="action-btn" id="humanBtn" onclick="toggleHuman()">👤 转人工</button>
    <button class="action-btn" onclick="openSuggest()">💡 提建议</button>
  </div>



  <div class="cw-input-area">
    <div class="cw-input-wrapper">
      <button class="cw-input-btn" title="表情" onclick="toggleEmojiPicker()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
      </button>
      <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)" />
      <button class="cw-input-btn" title="图片" onclick="document.getElementById('imageInput').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </button>
      <input type="text" class="cw-input" id="messageInput" placeholder="输入问题，或发煤炉链接/搜商品名..." onkeypress="if(event.keyCode==13) sendMessage()" />
      <button class="cw-send" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <!-- 表情选择器 -->
    <div id="emojiPicker" style="display:none;position:absolute;bottom:70px;left:16px;background:rgba(30,30,60,0.95);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px;max-width:280px;box-shadow:0 10px 40px rgba(0,0,0,0.3);z-index:100;">
      <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;">
        <span style="cursor:pointer;font-size:24px;padding:4px;border-radius:8px;transition:background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'" onclick="insertEmoji('😊')">😊</span>
        <span style="cursor:pointer;font-size:24px;padding:4px;border-radius:8px;transition:background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'" onclick="insertEmoji('😂')">😂</span>
        <span style="cursor:pointer;font-size:24px;padding:4px;border-radius:8px;transition:background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'" onclick="insertEmoji('🥰')">🥰</span>
        <span style="cursor:pointer;font-size:24px;padding:4px;border-radius:8px;transition:background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'" onclick="insertEmoji('😍')">😍</span>
        <span style="cursor:pointer;font-size:24px;padding:4px;border-radius:8px;transition:background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'" onclick="insertEmoji('🤔')">🤔</span>
        <span style="cursor:pointer;font-size:24px;padding:4px;border-radius:8px;transition:background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'" onclick="insertEmoji('😎')">😎</span>
        <span style="cursor:pointer;font-size:24px;padding:4px;border-radius:8px;transition:background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'" onclick="insertEmoji('🥳')">🥳</span>
        <span style="cursor:pointer;font-size:24px;padding:4px;border-radius:8px;transition:background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'" onclick="insertEmoji('😭')">😭</span>
        <span style="cursor:pointer;font-size:24px;padding:4px;border-radius:8px;transition:background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'" onclick="insertEmoji('😡')">😡</span>
        <span style="cursor:pointer;font-size:24px;padding:4px;border-radius:8px;transition:background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'" onclick="insertEmoji('👍')">👍</span>
        <span style="cursor:pointer;font-size:24px;padding:4px;border-radius:8px;transition:background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'" onclick="insertEmoji('👎')">👎</span>
        <span style="cursor:pointer;font-size:24px;padding:4px;border-radius:8px;transition:background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'" onclick="insertEmoji('👏')">👏</span>

        <span style="cursor:pointer;font-size:24px;padding:4px;border-radius:8px;transition:background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'" onclick="insertEmoji('🔥')">🔥</span>
        <span style="cursor:pointer;font-size:24px;padding:4px;border-radius:8px;transition:background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'" onclick="insertEmoji('🎉')">🎉</span>

        <span style="cursor:pointer;font-size:24px;padding:4px;border-radius:8px;transition:background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'" onclick="insertEmoji('🎁')">🎁</span>
        <span style="cursor:pointer;font-size:24px;padding:4px;border-radius:8px;transition:background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'" onclick="insertEmoji('🌟')">🌟</span>
      </div>
    </div>
  </div>
  <div id="emailHint" style="padding:0 16px 10px;font-size:11px;color:rgba(255,255,255,0.3);text-align:center;display:none;">请先绑定邮箱以开始对话</div>
</div>

<!-- 邮箱绑定弹窗 -->
<div class="email-overlay" id="emailModal" style="display:none;">
  <div class="email-card">
    <div class="logo">HOYOYO</div>
    <p class="sub" id="emailDesc">绑定邮箱，记录专属对话</p>
    <input type="email" id="emailInput" placeholder="name@hoyoyo.com" />
    <button onclick="saveEmail()" id="emailBtn">开始对话</button>
  </div>
</div>

<script>
  // ======== 多语言 ========
  const i18n = {
    'zh-CN': { header:'HOYOYO 智能助手', headerHuman:'HOYOYO 人工客服', emailDesc:'绑定邮箱，记录专属对话', emailPlaceholder:'name@hoyoyo.com', startChat:'开始对话', switchHuman:'👤 转人工', switchAI:'🤖 返回AI', suggest:'💡 提建议', demand:'📋 提需求', inputPlaceholder:'输入问题，或发煤炉链接/搜商品名...', send:'发送', pleaseEmail:'请先绑定邮箱', validEmail:'请输入有效邮箱', suggestPrompt:'请输入你的建议：', demandPrompt:'请描述你的服务需求：', suggestThanks:'感谢你的建议！', demandThanks:'需求已记录,我们会尽快处理！', networkError:'网络开小差了，请稍后再试～', waitMessage:'稍等一下，小助手正在赶来的路上～', humanWelcome:'已为您转接人工客服，请稍等客服回复～', aiWelcome:'已切换回AI智能助手' },
    'zh-TW': { header:'HOYOYO 智能助手', headerHuman:'HOYOYO 人工客服', emailDesc:'綁定信箱，記錄專屬對話', emailPlaceholder:'name@hoyoyo.com', startChat:'開始對話', switchHuman:'👤 轉人工客服', switchAI:'🤖 返回AI', suggest:'💡 提供建議', demand:'📋 提出需求', inputPlaceholder:'輸入問題，或發煤爐連結/搜尋商品名...', send:'發送', pleaseEmail:'請先綁定信箱', validEmail:'請輸入有效信箱', suggestPrompt:'請輸入您的建議：', demandPrompt:'請描述您的服務需求：', suggestThanks:'感謝您的建議！', demandThanks:'需求已記錄，我們會儘快處理！', networkError:'網路連線異常，請稍後再試～', waitMessage:'請稍候，小幫手正在趕來的路上～', humanWelcome:'已為您轉接人工客服，請稍等客服回覆～', aiWelcome:'已切換回AI智能助手' },
    'en': { header:'HOYOYO Assistant', headerHuman:'HOYOYO Live Agent', emailDesc:'Bind email for your conversation', emailPlaceholder:'name@hoyoyo.com', startChat:'Start Chat', switchHuman:'👤 Live Agent', switchAI:'🤖 Back to AI', suggest:'💡 Suggestion', demand:'📋 Request', inputPlaceholder:'Type question, or Mercari link/product name...', send:'Send', pleaseEmail:'Please bind your email first', validEmail:'Please enter a valid email', suggestPrompt:'Please enter your suggestion:', demandPrompt:'Please describe your service request:', suggestThanks:'Thanks for your suggestion!', demandThanks:'Request recorded, we will handle it soon!', networkError:'Network error, please try again later~', waitMessage:'Just a moment, our assistant is on the way~', humanWelcome:'Connected to live agent, please wait for a response~', aiWelcome:'Switched back to AI assistant' },
    'ja': { header:'HOYOYO アシスタント', headerHuman:'HOYOYO 有人対応', emailDesc:'メールアドレスを登録して会話を保存', emailPlaceholder:'name@hoyoyo.com', startChat:'チャット開始', switchHuman:'👤 有人対応', switchAI:'🤖 AIに戻る', suggest:'💡 提案する', demand:'📋 要望を送る', inputPlaceholder:'質問、またはメルカリのリンク/商品名を入力...', send:'送信', pleaseEmail:'先にメールアドレスを登録してください', validEmail:'有効なメールアドレスを入力してください', suggestPrompt:'提案を入力してください：', demandPrompt:'サービス要望を説明してください：', suggestThanks:'ご提案ありがとうございます！', demandThanks:'要望を受け付けました。早急に対応いたします！', networkError:'ネットワークエラーです。後でもう一度お試しください～', waitMessage:'少々お待ちください、アシスタントが向かっています～', humanWelcome:'有人客服に接続しました。返信をお待ちください～', aiWelcome:'AIアシスタントに戻りました' }
  };
  // 强制简体中文
  const t = i18n['zh-CN'];

  let userEmail = localStorage.getItem('hoyoyo_email');
  const chatBox = document.getElementById('chatBox');
  const msgInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');
  let isHumanMode = false;
  let humanPollTimer = null;
  let lastHumanMsgCount = 0;
  function getUserId() { return userEmail ? btoa(userEmail) : ''; }
  let userId = getUserId();

  function linkify(text) {
    return text.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  }

  function loadLocalHistory() {
    if (!userEmail) return;
    const history = JSON.parse(localStorage.getItem(`chat_${userEmail}`) || '[]');
    history.forEach(h => addBubble(h.role, h.content, false));
  }

  function addBubble(role, text, save = true) {
    const div = document.createElement('div');
    let msgClass = role;
    if (role === 'assistant') msgClass = 'ai';
    else if (role === 'human-agent') msgClass = 'human-agent';
    div.className = `msg ${msgClass}`;

    // 检查是否是图片消息
    let contentHtml;
    if (text && text.startsWith('[IMG]')) {
      contentHtml = renderMessageContent(text);
    } else {
      const escaped = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      contentHtml = linkify(escaped);
    }

    const avatarIcon = role === 'user' ? '😊' : (role === 'human-agent' ? '👩‍💼' : '🤖');
    const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    div.innerHTML = `<div class="msg-avatar">${avatarIcon}</div><div class="msg-content"><div class="msg-bubble">${contentHtml}</div><div class="msg-time">${time}</div></div>`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    if (save && userEmail) {
      let history = JSON.parse(localStorage.getItem(`chat_${userEmail}`) || '[]');
      history.push({ role, content: text });
      if (history.length > 50) history = history.slice(-50);
      localStorage.setItem(`chat_${userEmail}`, JSON.stringify(history));
    }
  }

  function addSysMsg(text) {
    const div = document.createElement('div');
    div.className = 'sys-msg';
    div.innerHTML = `<span>${text}</span>`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typingIndicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  function toggleChat() {
    const win = document.getElementById('chatWindow');
    const fab = document.getElementById('fabBtn');
    const isOpen = win.classList.contains('open');
    win.classList.toggle('open', !isOpen);
    fab.classList.toggle('active', !isOpen);
    if (!isOpen) msgInput.focus();
  }

  function sendQuick(text) {
    if (!userEmail) { showEmailModal(); return; }
    addBubble('user', text);
    callAI(text);
  }

  async function sendMessage() {
    const msg = msgInput.value.trim();
    if (!msg) return;
    if (!userEmail) { showEmailModal(); return; }
    addBubble('user', msg);
    msgInput.value = '';
    if (isHumanMode) {
      await sendHumanMsg(msg);
    } else {
      callAI(msg);
    }
  }

  async function callAI(text) {
    sendBtn.disabled = true;
    msgInput.disabled = true;
    showTyping();
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: userEmail, message: text })
      });
      const data = await res.json();
      hideTyping();
      addBubble('assistant', data.reply || t.waitMessage);
    } catch (err) {
      hideTyping();
      addBubble('assistant', t.networkError);
    } finally {
      sendBtn.disabled = false;
      msgInput.disabled = false;
      msgInput.focus();
    }
  }

  async function sendHumanMsg(text) {
    const currentUserId = getUserId();
    if (!currentUserId) { alert(t.pleaseEmail); return; }
    sendBtn.disabled = true;
    try {
      await fetch('/api/human-send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentUserId, email: userEmail, message: text })
      });
    } catch(e) { console.error(e); }
    sendBtn.disabled = false;
    msgInput.focus();
  }

  async function pollHumanMessages() {
    const currentUserId = getUserId();
    if (!isHumanMode || !currentUserId) return;
    try {
      const res = await fetch(`/api/human-history?userId=${encodeURIComponent(currentUserId)}`);
      if (!res.ok) throw new Error('fetch failed');
      const data = await res.json();
      if (data.messages && data.messages.length > 0) {
        const newMsgs = data.messages.slice(lastHumanMsgCount);
        newMsgs.forEach(m => {
          if (m.sender === 'agent') {
            addBubble('human-agent', m.content, false);
          }
        });
        lastHumanMsgCount = data.messages.length;
      }
    } catch(e) {
      console.warn('pollHumanMessages error:', e);
    }
  }

  function toggleHuman() {
    if (!userEmail) { showEmailModal(); return; }
    const btn = document.getElementById('humanBtn');
    const avatar = document.getElementById('headerAvatar');
    const title = document.getElementById('headerTitle');
    const dot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const modeTag = document.getElementById('modeTag');

    isHumanMode = !isHumanMode;

    if (isHumanMode) {
      btn.textContent = t.switchAI;
      btn.classList.add('active');
      avatar.textContent = '👩‍💼';
      avatar.className = 'cw-avatar human';
      title.textContent = t.headerHuman;
      dot.className = 'dot busy';
      statusText.textContent = '人工服务中';
      modeTag.textContent = '人工';
      modeTag.className = 'mode-tag human';
      addSysMsg('已转接人工客服');
      addBubble('human-agent', t.humanWelcome);
      lastHumanMsgCount = 0;
      humanPollTimer = setInterval(pollHumanMessages, 2000);
      pollHumanMessages();
    } else {
      btn.textContent = t.switchHuman;
      btn.classList.remove('active');
      avatar.textContent = '🤖';
      avatar.className = 'cw-avatar ai';
      title.textContent = t.header;
      dot.className = 'dot online';
      statusText.textContent = '在线';
      modeTag.textContent = 'AI';
      modeTag.className = 'mode-tag ai';
      addSysMsg('已切换回AI助手');
      addBubble('assistant', t.aiWelcome);
      if (humanPollTimer) { clearInterval(humanPollTimer); humanPollTimer = null; }
    }
  }

  function showEmailModal() {
    document.getElementById('emailModal').style.display = 'flex';
    document.getElementById('emailInput').focus();
  }

  function saveEmail() {
    const email = document.getElementById('emailInput').value.trim();
    if (!email || !email.includes('@')) { alert(t.validEmail); return; }
    userEmail = email;
    userId = getUserId(); // 更新 userId
    localStorage.setItem('hoyoyo_email', email);
    fetch('/api/save-user-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    }).catch(() => {});
    document.getElementById('emailModal').style.display = 'none';
    document.getElementById('emailHint').style.display = 'none';
    loadLocalHistory();
    addBubble('assistant', '您好！我是 HOYOYO 智能助手，有什么可以帮您的？😊');
  }

  function openSuggest() {
    if (!userEmail) { showEmailModal(); return; }
    const content = prompt(t.suggestPrompt);
    if (content) {
      fetch('/api/suggest', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ email: userEmail, content }) })
        .then(() => alert(t.suggestThanks)).catch(() => alert(t.networkError));
    }
  }

  function openDemand() {
    if (!userEmail) { showEmailModal(); return; }
    const content = prompt(t.demandPrompt);
    if (content) {
      fetch('/api/demand', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ email: userEmail, content }) })
        .then(() => alert(t.demandThanks)).catch(() => alert(t.networkError));
    }
  }

  // 表情选择器
  function toggleEmojiPicker() {
    const picker = document.getElementById('emojiPicker');
    picker.style.display = picker.style.display === 'none' ? 'block' : 'none';
  }

  function insertEmoji(emoji) {
    const input = document.getElementById('messageInput');
    input.value += emoji;
    input.focus();
    document.getElementById('emojiPicker').style.display = 'none';
  }

  // 图片上传处理
  function handleImageUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (!file.type.startsWith('image/')) {
      alert('请选择图片文件');
      return;
    }
    if (file.size > 5 * 1024 * 1024) {
      alert('图片大小不能超过5MB');
      return;
    }
    
    const reader = new FileReader();
    reader.onload = function(e) {
      const base64 = e.target.result;
      // 发送图片消息（会显示图片预览）
      sendImageMessage(base64);
    };
    reader.readAsDataURL(file);
  }

  async function sendImageMessage(base64Image) {
    if (!userEmail) { showEmailModal(); return; }
    const currentUserId = getUserId();
    if (!currentUserId) { alert(t.pleaseEmail); return; }

    try {
      // 添加图片消息到聊天框（显示实际图片）
      addImageBubble('user', base64Image);

      if (isHumanMode) {
        // 人工模式：发送图片数据（截断base64避免过大）
        const shortBase64 = base64Image.length > 1000 ? base64Image.substring(0, 1000) + '...[图片数据过长已截断]' : base64Image;
        await fetch('/api/human-send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: currentUserId, email: userEmail, message: '[IMG]' + shortBase64 })
        });
      } else {
        // AI模式：提示用户AI暂时无法识别图片
        setTimeout(() => {
          addBubble('assistant', '抱歉，我暂时无法识别图片内容。请用文字描述您的问题，我会尽力帮助您！', false);
        }, 500);
      }
    } catch(e) {
      console.error('sendImageMessage error:', e);
      alert('图片发送失败');
    }
  }

  // 添加图片消息气泡
  function addImageBubble(role, imageSrc, save = true) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const avatarIcon = role === 'user' ? '😊' : (role === 'human-agent' ? '👩‍💼' : '🤖');
    const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    div.innerHTML = `
      <div class="msg-avatar">${avatarIcon}</div>
      <div class="msg-content">
        <div class="msg-bubble" style="padding:8px;">
          <img src="${imageSrc}" style="max-width:200px;max-height:150px;border-radius:8px;display:block;" onclick="window.open(this.src)" />
        </div>
        <div class="msg-time">${time}</div>
      </div>
    `;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;

    if (save && userEmail) {
      let history = JSON.parse(localStorage.getItem(`chat_${userEmail}`) || '[]');
      history.push({ role, content: '[IMG]', imageSrc });
      if (history.length > 50) history = history.slice(-50);
      localStorage.setItem(`chat_${userEmail}`, JSON.stringify(history));
    }
  }

  // 渲染消息内容（支持图片）
  function renderMessageContent(content) {
    if (!content) return '';
    // 检测图片标记 [IMG]base64...
    if (content.startsWith('[IMG]')) {
      const imageSrc = content.substring(5);
      // 检查是否是有效的base64图片数据
      if (imageSrc.startsWith('data:image')) {
        return `<img src="${imageSrc}" style="max-width:200px;max-height:150px;border-radius:8px;display:block;cursor:pointer;" onclick="window.open(this.src)" />`;
      }
      return '<span style="color:rgba(255,255,255,0.5);">[图片]</span>';
    }
    return escapeHtml(content);
  }

  function escapeHtml(text) {
    if (!text) return '';
    return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // 点击外部关闭表情选择器
  document.addEventListener('click', function(e) {
    const picker = document.getElementById('emojiPicker');
    const emojiBtn = e.target.closest('.cw-input-btn[title="表情"]');
    if (picker && picker.style.display === 'block' && !emojiBtn && !picker.contains(e.target)) {
      picker.style.display = 'none';
    }
  });

  // 初始化多语言
  document.getElementById('messageInput').placeholder = t.inputPlaceholder;
  document.getElementById('emailDesc').textContent = t.emailDesc;
  document.getElementById('emailInput').placeholder = t.emailPlaceholder;
  document.getElementById('emailBtn').textContent = t.startChat;
  document.getElementById('humanBtn').textContent = t.switchHuman;

  // 初始化
  if (!userEmail) {
    document.getElementById('emailHint').style.display = 'block';
    showEmailModal();
  } else {
    loadLocalHistory();
    fetch('/api/save-user-email', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ email: userEmail }) }).catch(() => {});
  }
</script>
</body>
