<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOYOYO 人工客服</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Microsoft YaHei", sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
  .chat-window { width: 400px; max-width: 95vw; background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 80vh; }
  .header { background: #FF7A45; color: white; padding: 14px 18px; font-weight: bold; font-size: 16px; }
  .chat-box { flex: 1; padding: 12px; overflow-y: auto; background: #fafafa; }
  .message { margin-bottom: 12px; display: flex; }
  .message.agent { justify-content: flex-start; }
  .message.user { justify-content: flex-end; }
  .bubble { max-width: 80%; padding: 10px 14px; border-radius: 16px; line-height: 1.5; }
  .message.agent .bubble { background: white; border: 1px solid #eee; color: #333; }
  .message.user .bubble { background: #FF7A45; color: white; }
  .input-area { display: flex; padding: 10px; border-top: 1px solid #eee; }
  .input-area input { flex: 1; padding: 10px 12px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
  .input-area button { margin-left: 8px; background: #FF7A45; color: white; border: none; border-radius: 20px; padding: 10px 18px; cursor: pointer; }
</style>
</head>
<body>
<div class="chat-window">
  <div class="header" id="headerText">👩‍💼 HOYOYO 人工客服</div>
  <div class="chat-box" id="chatBox"></div>
  <div class="input-area">
    <input type="text" id="msgInput" placeholder="输入消息..." onkeypress="if(event.keyCode==13) sendMsg()" />
    <button onclick="sendMsg()">发送</button>
  </div>
</div>

<script>
  const i18n = {
    'zh-CN': { header:'👩‍💼 HOYOYO 人工客服', inputPlaceholder:'输入消息...', send:'发送', noUser:'缺少用户标识，请从AI客服页面转入' },
    'zh-TW': { header:'👩‍💼 HOYOYO 人工客服', inputPlaceholder:'輸入訊息...', send:'發送', noUser:'缺少用戶標識，請從AI客服頁面轉入' },
    'en': { header:'👩‍💼 HOYOYO Live Agent', inputPlaceholder:'Type a message...', send:'Send', noUser:'Missing user ID, please enter from AI chat page' },
    'ja': { header:'👩‍💼 HOYOYO 有人対応', inputPlaceholder:'メッセージを入力...', send:'送信', noUser:'ユーザーIDがありません。AIチャットページから移動してください' }
  };
  function getLang() {
    const lang = navigator.language;
    if (lang.startsWith('zh-TW') || lang.startsWith('zh-HK')) return 'zh-TW';
    if (lang.startsWith('zh')) return 'zh-CN';
    if (lang.startsWith('ja')) return 'ja';
    if (lang.startsWith('en')) return 'en';
    return 'zh-CN';
  }
  const t = i18n[getLang()];
  document.getElementById('headerText').innerText = t.header;
  document.getElementById('msgInput').placeholder = t.inputPlaceholder;
  document.querySelector('button').innerText = t.send;

  const urlParams = new URLSearchParams(window.location.search);
  const userId = urlParams.get('uid');
  const userEmail = urlParams.get('email');
  if (!userId || !userEmail) {
    alert(t.noUser);
    window.location.href = '/';
  }

  const chatBox = document.getElementById('chatBox');
  const msgInput = document.getElementById('msgInput');
  const STORAGE_KEY = `human_chat_${userId}`;

  // 链接转换函数
  function linkify(text) {
    return text.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  }

  function loadLocal() {
    const local = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    chatBox.innerHTML = '';
    local.forEach(m => addBubble(m.sender, m.content, m.time));
    chatBox.scrollTop = chatBox.scrollHeight;
  }
  function addBubble(sender, text, time) {
    const div = document.createElement('div');
    div.className = `message ${sender}`;
    const timeStr = time ? new Date(time).toLocaleTimeString() : '';
    const linked = linkify(text.replace(/\n/g,'<br>'));
    div.innerHTML = `<div class="bubble">${linked}${timeStr ? `<div style="font-size:10px;opacity:0.7;margin-top:4px;">${timeStr}</div>` : ''}</div>`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    let local = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    local.push({ sender, content: text, time: time || new Date().toISOString() });
    if (local.length > 100) local = local.slice(-100);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(local));
  }
  async function sendMsg() {
    const text = msgInput.value.trim();
    if (!text) return;
    addBubble('user', text);
    msgInput.value = '';
    try {
      await fetch('/api/human-send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, email: userEmail, message: text })
      });
    } catch(e) { console.error(e); }
  }
  async function pollMessages() {
    try {
      const res = await fetch(`/api/human-history?userId=${userId}`);
      const data = await res.json();
      if (data.messages) {
        const local = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        const newMsgs = data.messages.slice(local.length);
        newMsgs.forEach(m => {
          if (m.sender === 'agent') addBubble('agent', m.content, m.time);
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data.messages.map(m => ({
          sender: m.sender, content: m.content, time: m.time
        }))));
      }
    } catch(e) { console.error(e); }
  }

  loadLocal();
  setInterval(pollMessages, 1500);
  pollMessages();
</script>
</body>
</html>
