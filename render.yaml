services:
  - type: web
    name: hoyoyo-ai-service
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: VOLC_API_KEY
        sync: false
      - key: VOLC_MODEL_ID
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
    healthCheckPath: /
    autoDeploy: true