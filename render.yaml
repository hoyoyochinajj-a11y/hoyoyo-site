services:
  - type: web
    name: hoyoyo-site
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: VOLC_API_KEY
        sync: false
      - key: VOLC_MODEL_ID
        sync: false
      - key: MONGODB_URI
        sync: false
    healthCheckPath: /
    autoDeploy: true