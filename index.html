<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本代购 - 在线客服</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui, -apple-system, sans-serif}
body{background:#f5f7fa;padding:15px}
.chat-container{max-width:500px;margin:0 auto;background:#fff;border-radius:15px;box-shadow:0 4px 20px #00000015;overflow:hidden;height:95vh;display:flex;flex-direction:column}
.header{background:#6B46E4;color:white;padding:16px;text-align:center}
.header h2{font-size:18px}
.header p{font-size:13px;opacity:.9;margin-top:4px}
.msg-box{flex:1;padding:15px;overflow-y:auto;background:#f9fafb}
.bubble{margin-bottom:12px;max-width:80%;padding:10px 14px;border-radius:15px;line-height:1.5}
.bot{background:#6B46E4;color:white;align-self:flex-start;border-bottom-left-radius:5px}
.user{background:#e2e8f0;color:#111;align-self:flex-end;border-bottom-right-radius:5px;margin-left:auto}
.input-bar{display:flex;padding:10px;border-top:1px solid #eee}
.input-bar input{flex:1;padding:14px 16px;border-radius:30px;border:1px solid #ddd;outline:0;font-size:15px}
.input-bar button{margin-left:8px;padding:0 20px;background:#6B46E4;color:white;border:none;border-radius:30px;font-weight:bold}
.area{display:flex;flex-direction:column}
</style>
</head>

<body>
<div class="chat-container">
  <div class="header">
    <h2>日本代购 · 官方客服</h2>
    <p>24小时在线 | 正品代买 | 物流转运</p>
  </div>

  <div class="msg-box" id="msgBox">
    <div class="area">
      <div class="bubble bot" id="welcomeMsg"></div>
    </div>
  </div>

  <div class="input-bar">
    <input id="msgInput" placeholder="请输入您的问题…" />
    <button onclick="sendMsg()">发送</button>
  </div>
</div>

<script>
window.onload = function() {
  let welcome = localStorage.getItem('welcome') || '您好，我是您的专属客服，有什么可以帮您？';
  document.getElementById('welcomeMsg').textContent = welcome;
}

async function sendMsg() {
  let input = document.getElementById('msgInput');
  let text = input.value.trim();
  if (!text) return;

  let box = document.getElementById('msgBox');
  let area = document.querySelector('.area');

  area.innerHTML += `<div class="bubble user">${text}</div>`;
  area.innerHTML += `<div class="bubble bot" id="loading">正在思考中…</div>`;
  box.scrollTop = box.scrollHeight;
  input.value = '';

  let ak = localStorage.getItem('ak');
  let sk = localStorage.getItem('sk');
  let apiUrl = localStorage.getItem('apiUrl');
  let model = localStorage.getItem('model');
  let kb = localStorage.getItem('kb') || '';

  console.log("=== 调试信息 ===");
  console.log("AK:", ak);
  console.log("SK:", sk);
  console.log("API地址:", apiUrl);
  console.log("模型:", model);
  console.log("知识库:", kb);

  if (!ak || !sk || !apiUrl || !model) {
    document.getElementById('loading').textContent = "客服未配置API，请稍后再试";
    return;
  }

  try {
    const auth = btoa(`${ak}:${sk}`);

    const response = await fetch(apiUrl, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Basic ${auth}`
      },
      body: JSON.stringify({
        model: model,
        messages: [
          { role: "system", content: `你是日本代购客服，根据以下知识库回答用户问题：${kb}` },
          { role: "user", content: text }
        ],
        temperature: 0.7,
        max_tokens: 1000
      })
    });

    console.log("响应状态:", response.status);
    const data = await response.json();
    console.log("响应数据:", data);

    if (response.ok && data.choices?.[0]?.message?.content) {
      const reply = data.choices[0].message.content;
      document.getElementById('loading').textContent = reply;
    } else {
      document.getElementById('loading').textContent = `API错误: ${data.error?.message || '未知错误'}`;
    }
  } catch (e) {
    document.getElementById('loading').textContent = "服务异常，请稍后再试";
    console.error("请求失败:", e);
  }
  box.scrollTop = box.scrollHeight;
}
</script>
</body>
</html>
