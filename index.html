<!DOCTYPE html>
<html>
<head>
    <title>Test Page</title>
</head>
<body>
    <h1><!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客服系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f5f7fa;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
            padding: 25px;
        }

        .title {
            text-align: center;
            font-size: 24px;
            color: #333;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .info-box {
            background: #f8f9fa;
            border-left: 4px solid #007bff;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 6px;
        }

        .info-box p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            min-width: 160px;
            padding: 14px 20px;
            background: #007bff;
            color: white;
            text-align: center;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            transition: background 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #0056b3;
        }

        .btn-whatsapp {
            background: #25d366;
        }

        .btn-whatsapp:hover {
            background: #1da851;
        }

        .btn-telegram {
            background: #0088cc;
        }

        .btn-telegram:hover {
            background: #006699;
        }

        .tip {
            margin-top: 25px;
            color: #888;
            font-size: 14px;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">日本代购 客服中心</div>

        <div class="info-box">
            <p>📌 24小时在线客服</p>
            <p>📌 日本商品代买、代拍、代发货</p>
            <p>📌 正品保证 | 快速物流 | 售后无忧</p>
        </div>

        <div class="btn-group">
            <a class="btn btn-whatsapp" href="https://wa.me/你的号码" target="_blank">
                💬 WhatsApp 联系
            </a>
            <a class="btn btn-telegram" href="https://t.me/你的用户名" target="_blank">
                📩 Telegram 联系
            </a>
        </div>

        <div class="tip">
            工作时间：全天24小时在线<br>
            看到消息后会第一时间回复您
        </div>
    </div>
</body>
</html></h1>
</body>
</html>
